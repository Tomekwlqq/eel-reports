<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SejfZone — Mapa Percepcji Klienta</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: #f6f8fa;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}
.tab-bar {
  display: flex;
  align-items: center;
  background: #ffffff;
  border-bottom: 2px solid #d0d7de;
  padding: 0 20px;
  height: 46px;
  flex-shrink: 0;
  gap: 4px;
}
.tab-bar-brand {
  font-size: 13px;
  font-weight: 700;
  color: #1f2328;
  margin-right: 20px;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}
.tab-bar-brand span { color: #0969da; }
.divider {
  width: 1px;
  height: 22px;
  background: #d0d7de;
  margin-right: 8px;
}
.tab-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 0 18px;
  height: 46px;
  border: none;
  border-bottom: 3px solid transparent;
  background: transparent;
  color: #57606a;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: color .15s, border-color .15s, background .15s;
  white-space: nowrap;
  margin-bottom: -2px;
}
.tab-btn:hover {
  color: #1f2328;
  background: #f6f8fa;
}
.tab-btn.active {
  color: #0969da;
  border-bottom-color: #0969da;
  background: transparent;
}
.tab-count {
  font-size: 10px;
  font-weight: 700;
  background: #eaf1fb;
  color: #0969da;
  border-radius: 12px;
  padding: 1px 7px;
  letter-spacing: 0;
}
.tab-btn.active .tab-count {
  background: #0969da;
  color: #fff;
}
.frame-container {
  flex: 1;
  position: relative;
  overflow: hidden;
}
iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
  display: none;
}
iframe.active { display: block; }
</style>
</head>
<body>

<div class="tab-bar">
  <div class="tab-bar-brand">🔒 <span>SejfZone</span> — Mapa Percepcji</div>
  <div class="divider"></div>
  <button class="tab-btn active" id="tab-bron" onclick="switchTab('bron')">
    🔫 Szafy na broń <span class="tab-count">230</span>
  </button>
  <button class="tab-btn" id="tab-dom" onclick="switchTab('dom')">
    🏠 Sejfy domowe <span class="tab-count">230</span>
  </button>
</div>

<div class="frame-container">
  <iframe id="frame-bron" class="active" src="mapa-percepcji-bron.html" loading="eager"></iframe>
  <iframe id="frame-dom" src="mapa-percepcji-sejfy-domowe.html" loading="lazy"></iframe>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('frame-' + tab).classList.add('active');
  // Lazy-load na pierwsze kliknięcie
  const frame = document.getElementById('frame-' + tab);
  if (frame.dataset.loaded !== 'true') {
    frame.src = frame.src;
    frame.dataset.loaded = 'true';
  }
  try { localStorage.setItem('sejfzone_percepcja_tab', tab); } catch(e) {}
}
// Przywróć ostatnią zakładkę
try {
  const saved = localStorage.getItem('sejfzone_percepcja_tab');
  if (saved && saved !== 'bron') switchTab(saved);
} catch(e) {}
</script>

</body>
</html>
