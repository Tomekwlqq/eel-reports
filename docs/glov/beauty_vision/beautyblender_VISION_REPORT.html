<!DOCTYPE html>
<html lang="pl">
<head><meta charset="UTF-8"><title>? — Vision Scan</title><style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f8fafc;color:#1e293b;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.page-header{padding:10px 20px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:12px;flex-shrink:0}
.client-name{font-size:16px;font-weight:800}
.scan-meta{color:#94a3b8;font-size:11px}
.header-right{margin-left:auto;display:flex;gap:8px}
.toggle-group{display:flex;border:1px solid #e2e8f0;border-radius:6px;overflow:hidden}
.tbtn{padding:5px 12px;background:#fff;border:none;cursor:pointer;font-size:12px;font-weight:500;color:#64748b;border-right:1px solid #e2e8f0;transition:all .12s}
.tbtn:last-child{border-right:none}
.tbtn.active{background:#1e293b;color:#fff}
.new-block{margin:8px 16px;padding:8px 12px;background:#fef3c7;border:1px solid #fde68a;border-radius:6px;font-size:12px;flex-shrink:0}
.new-block ul{margin-top:4px;padding-left:18px;line-height:1.8}
.split-view{display:flex;flex:1;overflow:hidden}
.split-table{flex:0 0 62%;overflow-y:auto}
.split-shot{flex:0 0 38%;border-left:2px solid #e2e8f0;overflow-y:auto;background:#f1f5f9;scroll-behavior:smooth}
.shot-img{width:100%;display:block}
.scan-table{width:100%;border-collapse:collapse}
.scan-table thead{position:sticky;top:0;z-index:5}
.scan-table th{background:#f1f5f9;padding:8px 10px;text-align:left;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid #e2e8f0;white-space:nowrap}
.scan-table td{padding:7px 10px;border-bottom:1px solid #f1f5f9;vertical-align:top;font-size:12px}
.el-row{cursor:pointer;transition:background .1s}
.el-row:hover td{background:#f0f9ff}
.el-row.active td{background:#e0f2fe}
.col-lp{width:28px;color:#94a3b8;font-size:11px;text-align:right;padding-right:6px}
.col-el{width:170px;font-weight:600;color:#0f172a}
.col-etyk{width:200px;color:#0f172a;font-weight:600}
.col-opis{color:#64748b;line-height:1.5}
.col-zaw{color:#475569;line-height:1.5;font-size:12.5px}
.col-p{width:34px;text-align:center;font-size:15px}
.th-sub{font-weight:400;color:#94a3b8;font-size:10px}
.col-pos{width:110px;white-space:nowrap}
.zbadge{font-size:10px;font-weight:600;padding:2px 5px;border-radius:3px}
.dim{color:#94a3b8;font-size:10px}
.new-badge{background:#fde68a;color:#92400e;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:6px;vertical-align:middle}
.view-toggle{margin-right:8px}
.stack-panel{margin:8px 16px;padding:8px 12px;background:#ecfeff;border:1px solid #a5f3fc;border-radius:6px;font-size:11.5px;flex-shrink:0;line-height:2}
.chip{display:inline-block;background:var(--c)15;color:var(--c);border:1px solid var(--c)40;font-weight:600;font-size:11px;padding:2px 8px;border-radius:5px;margin:0 4px}
.col-sel{width:230px} .col-sel code{font-size:11px;color:#0f766e;background:#f0fdfa;padding:1px 5px;border-radius:4px;word-break:break-all}
.col-track{width:100px} .tbadge{font-size:10px;font-weight:600;padding:2px 6px;border-radius:3px;white-space:nowrap}
.col-gtm{width:180px} .gtm{font-size:10.5px;color:#92400e;background:#fef3c7;padding:1px 5px;border-radius:4px}
.col-cls{color:#94a3b8}
#tbl-developer{display:none}
#tbl-comments{display:none}
body.dev #tbl-shopper{display:none}
body.dev #tbl-developer{display:table}
body.comments #tbl-shopper{display:none}
body.comments #tbl-comments{display:table}
.col-kom{color:#475569;line-height:1.55;font-size:12.5px}
.col-obs,.col-obs-h{width:240px;border-left:2px solid #f3e8ff}
.col-obs{background:#faf5ff;color:#6b21a8;font-size:12px;line-height:1.5;cursor:text;outline:none}
.col-obs:empty::before{content:attr(data-ph);color:#c4b5d4;font-style:italic}
.col-obs:focus{background:#f3e8ff;box-shadow:inset 0 0 0 2px #d8b4fe}
.col-obs-h{color:#7c3aed}
</style></head>
<body>
<div class="page-header">
  <div>
    <span class="client-name">?</span>
    <span class="scan-meta"> — Vision Scan —  — <a href="https://www.beautyblender.com" target="_blank">https://www.beautyblender.com</a> — platforma: ?</span>
  </div>
  <div class="header-right">
<div class="toggle-group view-toggle"><button class="tbtn active" data-view="shopper" onclick="setView('shopper',this)">🛍 Shopper</button></div>
<div class="toggle-group">
  <button class="tbtn active" data-vp="desktop" onclick="setVP('desktop',this)">🖥 Desktop</button>
  
</div></div>
</div>


<div class="split-view">
  <div class="split-table">
    <table class="scan-table" id="tbl-shopper">
      <thead><tr>
        <th class="col-lp">LP</th><th class="col-etyk">Etykieta <span class="th-sub">(jak jest)</span></th><th class="col-el">Typ / rola obiektu</th><th>Zawartość / akcje</th><th class="col-obs-h">Obserwacje <span class="th-sub">(→ baza)</span></th><th class="col-p" title="personalizacja">P</th><th class="col-pos">Pozycja</th>
      </tr></thead>
      <tbody></tbody>
    </table>
    <table class="scan-table" id="tbl-developer">
      <thead><tr>
        <th class="col-lp">LP</th><th>Element</th><th>Selektor</th><th>Tracking</th><th>data-gtm-title</th><th>Klasy</th>
      </tr></thead>
      <tbody></tbody>
    </table>
  </div>
  <div class="split-shot">
    <img id="shot-img" class="shot-img" src="" alt="screenshot">
  </div>
</div>
<script>
var imgD = "";
var imgM = "";
var currentVP = 'desktop';

function scrollShot(top) {
    var img = document.getElementById('shot-img');
    var vp  = document.querySelector('.split-shot');
    if (!img || !vp) return;
    document.querySelectorAll('.el-row').forEach(r => r.classList.remove('active'));
    event.currentTarget.classList.add('active');
    var pageW = currentVP === 'desktop' ? 1440 : 390;
    var scale  = img.offsetWidth / pageW;
    var offset = Math.max(0, top * scale - vp.offsetHeight * 0.15);
    vp.scrollTo({ top: offset, behavior: 'smooth' });
}

function setVP(vp, btn) {
    currentVP = vp;
    document.querySelectorAll('.tbtn[data-vp]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    var img = document.getElementById('shot-img');
    if (img) {
        img.src = vp === 'desktop' ? imgD : imgM;
        // mobile: nie rozciągaj ponad natywne 390px (inaczej upscale/rozmycie)
        img.style.maxWidth = vp === 'mobile' ? '390px' : '';
        img.style.margin = vp === 'mobile' ? '0 auto' : '';
    }
}

function setView(view, btn) {
    document.querySelectorAll('.tbtn[data-view]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.body.classList.toggle('dev', view === 'developer');
    document.body.classList.toggle('comments', view === 'comments');
}
</script>
</body></html>
