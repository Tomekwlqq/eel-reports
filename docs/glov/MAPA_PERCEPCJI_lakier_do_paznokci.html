<!doctype html><html lang="pl"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mapa percepcji odpowiedzi — CoolNails by GLOV</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f6f8fa;
  --bg-sidebar: #ffffff;
  --bg-card: #ffffff;
  --bg-card-hover: #f0f3f6;
  --border: #d0d7de;
  --border-subtle: #e8ecf0;
  --text-primary: #1f2328;
  --text-secondary: #57606a;
  --text-muted: #8c959f;
  --accent: #0969da;
  --p1: #ef4444; --p1-bg: rgba(239,68,68,.12);
  --p2: #f97316; --p2-bg: rgba(249,115,22,.12);
  --p3: #eab308; --p3-bg: rgba(234,179,8,.12);
  --p4: #6b7280; --p4-bg: rgba(107,114,128,.12);
  --status-brak: #3b82f6;
  --status-istnieje: #22c55e;
  --status-rozbudowac: #818cf8;
  --path-a: #3b82f6; --path-b: #8b5cf6; --path-c: #ec4899; --path-d: #14b8a6;
  --path-e: #f59e0b; --path-f: #10b981; --path-g: #f43f5e; --path-cross: #94a3b8;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text-primary); display: flex; min-height: 100vh; overflow: hidden; }
/* SIDEBAR */
.sidebar { width: 240px; min-width: 240px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100vh; position: sticky; top: 0; overflow-y: auto; }
.sidebar-logo { padding: 18px 16px 14px; border-bottom: 1px solid var(--border); }
.sidebar-logo .brand { font-size: 15px; font-weight: 700; color: var(--text-primary); }
.sidebar-logo .subtitle { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.sidebar-logo .total-badge { display: inline-flex; align-items: center; background: var(--accent); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; margin-top: 8px; }
.sidebar-section { padding: 10px 12px 4px; }
.sidebar-section-label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .8px; padding: 0 4px; margin-bottom: 5px; }
.path-btn { display: flex; align-items: center; gap: 8px; width: 100%; padding: 6px 8px; border-radius: 6px; border: none; background: transparent; color: var(--text-secondary); font-size: 12px; cursor: pointer; text-align: left; transition: background .15s, color .15s; margin-bottom: 2px; }
.path-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }
.path-btn.active { background: rgba(31,111,235,.15); color: #58a6ff; }
.path-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.path-label { flex: 1; font-size: 11px; line-height: 1.3; }
.path-count { font-size: 11px; font-weight: 700; color: var(--text-muted); background: var(--border-subtle); padding: 1px 6px; border-radius: 10px; min-width: 24px; text-align: center; }
.sidebar-divider { height: 1px; background: var(--border); margin: 6px 12px; }
.legend-row { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-secondary); padding: 3px 4px; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.sidebar-tabs { display: flex; gap: 4px; padding: 10px 12px 6px; border-top: 1px solid var(--border); margin-top: auto; }
.stab { flex: 1; padding: 8px 4px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); font-size: 11px; font-weight: 600; cursor: pointer; text-align: center; transition: all .15s; line-height: 1.3; }
.stab:hover { background: var(--bg-card-hover); color: var(--text-primary); }
.stab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.stab .stab-icon { font-size: 16px; display: block; margin-bottom: 2px; }
.sidebar-footer { padding: 8px 12px 12px; border-top: none; }
.reset-btn { width: 100%; padding: 7px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); font-size: 12px; cursor: pointer; transition: all .15s; }
.reset-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }
/* LIST TAB */
.list-view { padding: 16px 20px; }
.list-toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
.list-progress { flex: 1; min-width: 180px; }
.list-progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 4px; }
.list-progress-fill { height: 100%; background: var(--status-istnieje); border-radius: 3px; transition: width .3s; }
.list-progress-label { font-size: 11px; color: var(--text-muted); }
.copy-btn { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-secondary); font-size: 12px; cursor: pointer; transition: all .15s; white-space: nowrap; }
.copy-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.sort-group { display: flex; gap: 4px; align-items: center; }
.sort-label { font-size: 10px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; }
.sort-btn { padding: 3px 9px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); font-size: 11px; cursor: pointer; }
.sort-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.list-item { display: flex; align-items: flex-start; gap: 10px; padding: 7px 10px; border-radius: 6px; border: 1px solid transparent; margin-bottom: 3px; cursor: pointer; transition: background .12s; }
.list-item:hover { background: var(--bg-card); border-color: var(--border); }
.list-item.checked .list-title { text-decoration: line-through; color: var(--text-muted); }
.list-cb { width: 16px; height: 16px; border: 2px solid var(--border); border-radius: 3px; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; font-size: 10px; transition: all .15s; background: var(--bg-card); }
.list-item.checked .list-cb { background: var(--status-istnieje); border-color: var(--status-istnieje); color: #fff; }
.list-nr { font-size: 11px; color: var(--text-muted); min-width: 28px; font-weight: 700; margin-top: 2px; flex-shrink: 0; }
.list-title { font-size: 13px; color: var(--text-primary); line-height: 1.4; flex: 1; }
.list-meta { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.list-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 3px; }
.list-section-head { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .8px; color: var(--text-muted); padding: 10px 10px 4px; border-bottom: 1px solid var(--border-subtle); margin-bottom: 4px; margin-top: 8px; }
/* INFO TAB */
.info-view { padding: 24px 32px; max-width: 760px; }
.info-view h2 { font-size: 20px; font-weight: 700; margin-bottom: 12px; margin-top: 28px; color: var(--text-primary); border-bottom: 1px solid var(--border); padding-bottom: 8px; }
.info-view h2:first-child { margin-top: 0; }
.info-view h3 { font-size: 14px; font-weight: 700; margin-top: 18px; margin-bottom: 8px; color: var(--text-primary); }
.info-view p { font-size: 13px; line-height: 1.7; color: var(--text-secondary); margin-bottom: 10px; }
.info-view ul { padding-left: 20px; margin-bottom: 12px; }
.info-view li { font-size: 13px; line-height: 1.7; color: var(--text-secondary); margin-bottom: 4px; }
.info-view strong { color: var(--text-primary); }
.info-cep-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 14px 0; }
.info-cep-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
.info-cep-card .cep-path { font-size: 11px; font-weight: 800; padding: 2px 8px; border-radius: 4px; color: #fff; display: inline-block; margin-bottom: 6px; }
.info-cep-card .cep-trigger { font-size: 12px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
.info-cep-card .cep-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
.info-tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; margin: 2px; }
/* MAIN */
.main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; min-width: 0; }
/* TOPBAR */
.topbar { background: var(--bg-sidebar); border-bottom: 1px solid var(--border); padding: 8px 16px; display: flex; flex-wrap: wrap; align-items: center; gap: 8px; flex-shrink: 0; }
.filter-group { display: flex; align-items: center; gap: 3px; flex-wrap: wrap; }
.filter-label { font-size: 10px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-right: 2px; white-space: nowrap; }
.filter-pill { padding: 3px 9px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); font-size: 11px; font-weight: 500; cursor: pointer; transition: all .15s; white-space: nowrap; }
.filter-pill:hover { border-color: var(--text-muted); color: var(--text-primary); }
.filter-pill.active { border-color: transparent; color: #fff; font-weight: 700; }
.filter-pill.active.all { background: var(--accent); }
.filter-pill.active.p1 { background: var(--p1); }
.filter-pill.active.p2 { background: var(--p2); }
.filter-pill.active.p3 { background: var(--p3); color: #111; }
.filter-pill.active.p4 { background: var(--p4); }
.filter-pill.active.tn { background: #1f6feb; }
.filter-pill.active.tf { background: #8b5cf6; }
.filter-pill.active.ts { background: #10b981; }
.filter-pill.active.te { background: #f59e0b; color: #111; }
.filter-pill.active.tem { background: #ec4899; }
.filter-pill.active.tr { background: #14b8a6; color: #111; }
.filter-pill.active.tst { background: #94a3b8; color: #111; }
.filter-pill.active.ti { background: #2dd4bf; color: #111; }
.filter-pill.active.sb { background: var(--status-brak); }
.filter-pill.active.si { background: var(--status-istnieje); color: #111; }
.filter-pill.active.sr { background: var(--status-rozbudowac); }
.topbar-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; flex-shrink: 0; }
.search-input { padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-primary); font-size: 12px; width: 180px; outline: none; transition: border-color .15s; }
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text-muted); }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.counter { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
.counter strong { color: var(--text-primary); font-size: 14px; }
/* STATS */
.statsbar { padding: 10px 16px; display: flex; gap: 10px; flex-shrink: 0; border-bottom: 1px solid var(--border); background: var(--bg); }
.stat-card { flex: 1; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; }
.stat-card .val { font-size: 22px; font-weight: 700; line-height: 1; }
.stat-card .lbl { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
.cv1 { color: var(--p1); } .cv2 { color: var(--status-brak); } .cv3 { color: var(--status-istnieje); }
/* CONTENT */
.content { flex: 1; overflow-y: auto; padding: 18px; }
/* PATH */
.path-section { margin-bottom: 28px; }
.path-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border-subtle); }
.path-badge { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 6px; font-size: 12px; font-weight: 800; color: #fff; flex-shrink: 0; }
.path-title { font-size: 14px; font-weight: 700; flex: 1; }
.path-total { font-size: 12px; color: var(--text-muted); background: var(--border-subtle); padding: 2px 8px; border-radius: 10px; }
/* STATE */
.state-section { margin-bottom: 16px; }
.state-header { display: flex; align-items: center; gap: 8px; padding: 5px 8px; border-radius: 6px; cursor: pointer; transition: background .15s; margin-bottom: 8px; user-select: none; }
.state-header:hover { background: var(--border-subtle); }
.state-toggle { font-size: 10px; color: var(--text-muted); width: 14px; transition: transform .2s; flex-shrink: 0; display: inline-block; }
.state-toggle.collapsed { transform: rotate(-90deg); }
.state-code { font-size: 11px; font-weight: 800; padding: 2px 7px; border-radius: 4px; color: #fff; flex-shrink: 0; }
.state-name { font-size: 13px; font-weight: 600; color: var(--text-secondary); flex: 1; }
.state-count { font-size: 11px; color: var(--text-muted); background: var(--border-subtle); padding: 1px 7px; border-radius: 10px; }
.state-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 7px; padding-left: 20px; overflow: hidden; transition: max-height .25s ease, opacity .25s ease; }
.state-cards.collapsed { max-height: 0 !important; opacity: 0; }
/* CARD */
.article-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 9px 11px 9px 14px; position: relative; cursor: default; transition: background .15s, box-shadow .15s; display: flex; flex-direction: column; gap: 5px; overflow: hidden; }
.article-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 8px 0 0 8px; }
.article-card.brak { border-color: rgba(59,130,246,.2); } .article-card.brak::before { background: var(--status-brak); }
.article-card.istnieje { border-color: rgba(34,197,94,.18); } .article-card.istnieje::before { background: var(--status-istnieje); }
.article-card.rozbudowac { border-color: rgba(129,140,248,.2); } .article-card.rozbudowac::before { background: var(--status-rozbudowac); }
.article-card:hover { background: var(--bg-card-hover); box-shadow: 0 2px 10px rgba(0,0,0,.25); }
.card-top { display: flex; align-items: flex-start; gap: 6px; }
.card-nr { font-size: 10px; font-weight: 700; color: var(--text-muted); min-width: 26px; padding-top: 1px; flex-shrink: 0; }
.card-title { font-size: 12px; color: var(--text-primary); line-height: 1.4; flex: 1; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.article-card:hover .card-title { -webkit-line-clamp: unset; }
.card-bottom { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; padding-left: 32px; }
.badge-path { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px; color: #fff; flex-shrink: 0; }
.badge-prio { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px; flex-shrink: 0; }
.pp1 { background: var(--p1-bg); color: var(--p1); border: 1px solid rgba(239,68,68,.3); }
.pp2 { background: var(--p2-bg); color: var(--p2); border: 1px solid rgba(249,115,22,.3); }
.pp3 { background: var(--p3-bg); color: var(--p3); border: 1px solid rgba(234,179,8,.3); }
.pp4 { background: var(--p4-bg); color: var(--p4); border: 1px solid rgba(107,114,128,.3); }
.badge-typ { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 4px; letter-spacing: .3px; flex-shrink: 0; }
.tn { background: rgba(31,111,235,.12); color: #58a6ff; border: 1px solid rgba(31,111,235,.25); }
.tf { background: rgba(139,92,246,.12); color: #a78bfa; border: 1px solid rgba(139,92,246,.25); }
.ts { background: rgba(16,185,129,.12); color: #34d399; border: 1px solid rgba(16,185,129,.25); }
.te { background: rgba(245,158,11,.12); color: #fbbf24; border: 1px solid rgba(245,158,11,.25); }
.tem { background: rgba(236,72,153,.12); color: #f472b6; border: 1px solid rgba(236,72,153,.25); }
.tr { background: rgba(20,184,166,.12); color: #2dd4bf; border: 1px solid rgba(20,184,166,.25); }
.tst { background: rgba(148,163,184,.12); color: #94a3b8; border: 1px solid rgba(148,163,184,.25); }
.ti { background: rgba(20,184,166,.12); color: #2dd4bf; border: 1px solid rgba(20,184,166,.25); }
.status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-left: auto; }
.db { background: var(--status-brak); box-shadow: 0 0 4px var(--status-brak); }
.di { background: var(--status-istnieje); }
.dr { background: var(--status-rozbudowac); }
.card-keyword { font-size: 10px; color: var(--text-muted); padding-left: 32px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: none; }
.article-card:hover .card-keyword { display: block; }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.hidden { display: none !important; }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

.sila-badge{font-size:12px;margin-right:2px}
.card-angle{font-size:12px;color:var(--text-secondary);line-height:1.45;margin-top:2px;border-top:1px dashed var(--border);padding-top:5px}
.card-angle b{color:var(--text-primary)}
.badge-int{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;background:#eef1f4;color:#475569}
.card-fmts{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.fmt{font-size:10.5px;padding:1px 7px;border-radius:20px;background:#eef2ff;color:#4338ca;border:1px solid #c7d2fe;white-space:nowrap}
.fmt.fmt-ad{background:#fff7ed;color:#c2410c;border-color:#fed7aa}
.sg{color:#16a34a}.sy{color:#d97706}.sr{color:#dc2626}
.article-card.kg::before{background:#16a34a}.article-card.ky::before{background:#d97706}.article-card.kr::before{background:#dc2626}
</style></head><body>
<nav class="sidebar">
  <div class="sidebar-header">
    <div class="title">CoolNails by GLOV</div>
    <div class="subtitle">Mapa percepcji odpowiedzi</div>
    <div class="total-badge">188 pytań · 10 ścieżek</div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-section-label">Ścieżki wejścia (CEP)</div>
    <button class="path-btn active" data-path="all" onclick="filterPath(this,'all')">
      <span class="path-dot" style="background:#94a3b8"></span>
      <span class="path-label">Wszystkie ścieżki</span>
      <span class="path-count" id="cnt-all">0</span></button>
    <button class="path-btn" data-path="A" onclick="filterPath(this,'A')"><span class="path-dot" style="background:#3b82f6"></span><span class="path-label">A · cep_pielegnacja</span><span class="path-count" id="cnt-A">0</span></button><button class="path-btn" data-path="B" onclick="filterPath(this,'B')"><span class="path-dot" style="background:#8b5cf6"></span><span class="path-label">B · cep_dom_szybko</span><span class="path-count" id="cnt-B">0</span></button><button class="path-btn" data-path="C" onclick="filterPath(this,'C')"><span class="path-dot" style="background:#ec4899"></span><span class="path-label">C · cep_zmiana</span><span class="path-count" id="cnt-C">0</span></button><button class="path-btn" data-path="D" onclick="filterPath(this,'D')"><span class="path-dot" style="background:#14b8a6"></span><span class="path-label">D · cep_odswiezenie</span><span class="path-count" id="cnt-D">0</span></button><button class="path-btn" data-path="E" onclick="filterPath(this,'E')"><span class="path-dot" style="background:#f59e0b"></span><span class="path-label">E · cep_social_moda</span><span class="path-count" id="cnt-E">0</span></button><button class="path-btn" data-path="F" onclick="filterPath(this,'F')"><span class="path-dot" style="background:#10b981"></span><span class="path-label">F · cep_event</span><span class="path-count" id="cnt-F">0</span></button><button class="path-btn" data-path="G" onclick="filterPath(this,'G')"><span class="path-dot" style="background:#f43f5e"></span><span class="path-label">G · cep_trwalosc</span><span class="path-count" id="cnt-G">0</span></button><button class="path-btn" data-path="H" onclick="filterPath(this,'H')"><span class="path-dot" style="background:#0ea5e9"></span><span class="path-label">H · cep_salon_w_domu</span><span class="path-count" id="cnt-H">0</span></button><button class="path-btn" data-path="I" onclick="filterPath(this,'I')"><span class="path-dot" style="background:#a855f7"></span><span class="path-label">I · cep_dziecko</span><span class="path-count" id="cnt-I">0</span></button><button class="path-btn" data-path="J" onclick="filterPath(this,'J')"><span class="path-dot" style="background:#f97316"></span><span class="path-label">J · cep_impuls_estetyczny</span><span class="path-count" id="cnt-J">0</span></button>
  </div>
  <div class="sidebar-divider"></div>
  <div class="sidebar-section">
    <div class="sidebar-section-label">Siła wejścia</div>
    <div class="legend-row"><span class="legend-dot" style="background:#16a34a"></span>🟢 mocne — atakujemy</div>
    <div class="legend-row"><span class="legend-dot" style="background:#d97706"></span>🟡 reframe — przekuj oś</div>
    <div class="legend-row"><span class="legend-dot" style="background:#dc2626"></span>🔴 do dopracowania — kąt trudny</div>
  </div>
  <div class="sidebar-tabs">
    <button class="stab active" id="stab-mapa" onclick="switchTab('mapa')"><span class="stab-icon">🗺️</span>MAPA</button>
    <button class="stab" id="stab-lista" onclick="switchTab('lista')"><span class="stab-icon">☑️</span>LISTA</button>
    <button class="stab" id="stab-info" onclick="switchTab('info')"><span class="stab-icon">ℹ️</span>INFO</button>
  </div>
  <div class="sidebar-footer"><button class="reset-btn" onclick="resetAll()">↺ Reset filtrów</button></div>
</nav>
<div class="main">
  <div class="topbar">

 do paznokci wygl\u0105da \u015bwie\u017co i b\u0142yszcz\u0105co zanim zaczyna matowie\u0107 lub schodzi\u0107"}], "PN": {"A": "cep_pielegnacja", "B": "cep_dom_szybko", "C": "cep_zmiana", "D": "cep_odswiezenie", "E": "cep_social_moda", "F": "cep_event", "G": "cep_trwalosc", "H": "cep_salon_w_domu", "I": "cep_dziecko", "J": "cep_impuls_estetyczny"}, "PC": {"A": "#3b82f6", "B": "#8b5cf6", "C": "#ec4899", "D": "#14b8a6", "E": "#f59e0b", "F": "#10b981", "G": "#f43f5e", "H": "#0ea5e9", "I": "#a855f7", "J": "#f97316"}, "PS": {"A": [{"c": "A1", "n": "Potrzeba/impuls"}, {"c": "A2", "n": "Rozpoznanie CEP"}, {"c": "A3", "n": "Nauka kategorii"}, {"c": "A4", "n": "Preselekcja"}, {"c": "A5", "n": "Por\u00f3wnywanie"}, {"c": "A6", "n": "Wyb\u00f3r sklepu"}, {"c": "A7", "n": "Zakup"}], "B": [{"c": "B1", "n": "Potrzeba/impuls"}, {"c": "B2", "n": "Rozpoznanie CEP"}, {"c": "B3", "n": "Nauka kategorii"}, {"c": "B4", "n": "Preselekcja"}, {"c": "B5", "n": "Por\u00f3wnywanie"}, {"c": "B6", "n": "Wyb\u00f3r sklepu"}, {"c": "B7", "n": "Zakup"}], "C": [{"c": "C1", "n": "Potrzeba/impuls"}, {"c": "C2", "n": "Rozpoznanie CEP"}, {"c": "C3", "n": "Nauka kategorii"}, {"c": "C4", "n": "Preselekcja"}, {"c": "C5", "n": "Por\u00f3wnywanie"}, {"c": "C6", "n": "Wyb\u00f3r sklepu"}, {"c": "C7", "n": "Zakup"}], "D": [{"c": "D1", "n": "Potrzeba/impuls"}, {"c": "D2", "n": "Rozpoznanie CEP"}, {"c": "D3", "n": "Nauka kategorii"}, {"c": "D4", "n": "Preselekcja"}, {"c": "D5", "n": "Por\u00f3wnywanie"}, {"c": "D6", "n": "Wyb\u00f3r sklepu"}, {"c": "D7", "n": "Zakup"}], "E": [{"c": "E1", "n": "Potrzeba/impuls"}, {"c": "E2", "n": "Rozpoznanie CEP"}, {"c": "E3", "n": "Nauka kategorii"}, {"c": "E4", "n": "Preselekcja"}, {"c": "E5", "n": "Por\u00f3wnywanie"}, {"c": "E6", "n": "Wyb\u00f3r sklepu"}, {"c": "E7", "n": "Zakup"}], "F": [{"c": "F1", "n": "Potrzeba/impuls"}, {"c": "F2", "n": "Rozpoznanie CEP"}, {"c": "F3", "n": "Nauka kategorii"}, {"c": "F4", "n": "Preselekcja"}, {"c": "F5", "n": "Por\u00f3wnywanie"}, {"c": "F6", "n": "Wyb\u00f3r sklepu"}, {"c": "F7", "n": "Zakup"}], "G": [{"c": "G1", "n": "Potrzeba/impuls"}, {"c": "G2", "n": "Rozpoznanie CEP"}, {"c": "G3", "n": "Nauka kategorii"}, {"c": "G4", "n": "Preselekcja"}, {"c": "G5", "n": "Por\u00f3wnywanie"}, {"c": "G6", "n": "Wyb\u00f3r sklepu"}, {"c": "G7", "n": "Zakup"}], "H": [{"c": "H1", "n": "Potrzeba/impuls"}, {"c": "H2", "n": "Rozpoznanie CEP"}, {"c": "H3", "n": "Nauka kategorii"}, {"c": "H4", "n": "Preselekcja"}, {"c": "H5", "n": "Por\u00f3wnywanie"}, {"c": "H6", "n": "Wyb\u00f3r sklepu"}, {"c": "H7", "n": "Zakup"}], "I": [{"c": "I1", "n": "Potrzeba/impuls"}, {"c": "I2", "n": "Rozpoznanie CEP"}, {"c": "I3", "n": "Nauka kategorii"}, {"c": "I4", "n": "Preselekcja"}, {"c": "I5", "n": "Por\u00f3wnywanie"}, {"c": "I6", "n": "Wyb\u00f3r sklepu"}, {"c": "I7", "n": "Zakup"}], "J": [{"c": "J1", "n": "Potrzeba/impuls"}, {"c": "J2", "n": "Rozpoznanie CEP"}, {"c": "J3", "n": "Nauka kategorii"}, {"c": "J4", "n": "Preselekcja"}, {"c": "J5", "n": "Por\u00f3wnywanie"}, {"c": "J6", "n": "Wyb\u00f3r sklepu"}, {"c": "J7", "n": "Zakup"}]}, "SC": {"green": "#16a34a", "yellow": "#d97706", "red": "#dc2626"}, "SE": {"green": "\ud83d\udfe2", "yellow": "\ud83d\udfe1", "red": "\ud83d\udd34"}, "SL": {"green": "mocne wej\u015bcie", "yellow": "reframe", "red": "do dopracowania"}};
const ART=D.ART, PN=D.PN, PC=D.PC, PS=D.PS, SC=D.SC, SE=D.SE, SL=D.SL;
const SK={green:'kg',yellow:'ky',red:'kr'};
let filt={sila:'all',typ:'all'}, activePath='all', q='';

function vis(a){
  if(activePath!=='all'&&a.p!==activePath)return false;
  if(filt.sila!=='all'&&a.sila!==filt.sila)return false;
  if(filt.typ!=='all'&&a.y!==filt.typ)return false;
  if(q){const ql=q.toLowerCase();if(!a.t.toLowerCase().includes(ql)&&!(a.angle||'').toLowerCase().includes(ql))return false;}
  return true;
}
function card(a){
  const pc=PC[a.p]||'#94a3b8';
  return `<div class="article-card ${SK[a.sila]||'ky'}" data-nr="${a.nr}">
<div class="card-top"><span class="sila-badge">${SE[a.sila]||'🟡'}</span><span class="card-title">${a.t}</span></div>
<div class="card-angle"><b>→</b> ${a.angle||'—'}</div>
${(a.formaty&&a.formaty.length)?`<div class="card-fmts">${a.formaty.map(f=>`<span class="fmt ${f.r?'fmt-ad':''}" title="${f.k||''}">${FMI[f.f]||'📄'} ${f.f}${f.k?' · '+f.k:''}</span>`).join('')}</div>`:''}
<div class="card-bottom"><span class="badge-path" style="background:${pc}">${a.p}</span><span class="badge-int">${a.y}</span></div>
</div>`;
}
const FMI={blog:'📝',reels:'🎬',youtube:'▶️',pdp:'🛒',faq:'❓',ads:'📣',email:'✉️',ugc:'👤'};
function render(){
  const content=document.getElementById('contentArea');
  const paths=activePath==='all'?Object.keys(PN):[activePath];
  let html='',total=0;
  for(const path of paths){
    const pc=PC[path],states=PS[path]||[];let ph='',pcount=0;
    for(const st of states){
      const arts=ART.filter(a=>a.s===st.c);
      const filtered=arts.filter(vis);
      if(arts.length===0)continue;
      const cards=arts.map(a=>vis(a)?card(a):`<div class="hidden">${card(a)}</div>`).join('');
      pcount+=filtered.length;total+=filtered.length;
      ph+=`<div class="state-section"><div class="state-header" onclick="toggleState(this)"><span class="state-toggle">▼</span><span class="state-code" style="background:${pc}">${st.c}</span><span class="state-name">${st.n}</span><span class="state-count">${filtered.length}</span></div><div class="state-cards" style="max-height:none">${cards}</div></div>`;
    }
    if(pcount===0&&activePath==='all')continue;
    html+=`<div class="path-section"><div class="path-header"><span class="path-badge" style="background:${pc}">${path}</span><span class="path-title">Ścieżka ${path}: ${PN[path]}</span><span class="path-total">${pcount} pytań</span></div>${ph}</div>`;
  }
  if(!html)html='<div class="empty-state"><p>Brak pytań spełniających kryteria.</p></div>';
  content.innerHTML=html;
  document.getElementById('visibleCount').textContent=total;
  updateStats();
}
function updateStats(){
  const v=ART.filter(vis);
  document.getElementById('stat-total').textContent=v.length;
  document.getElementById('stat-g').textContent=v.filter(a=>a.sila==='green').length;
  document.getElementById('stat-y').textContent=v.filter(a=>a.sila==='yellow').length;
  document.getElementById('stat-r').textContent=v.filter(a=>a.sila==='red').length;
  ['all',...Object.keys(PN)].forEach(p=>{const el=document.getElementById('cnt-'+p);if(el)el.textContent=p==='all'?ART.filter(vis).length:ART.filter(a=>a.p===p&&vis(a)).length;});
}
function filterPath(btn,path){activePath=path;document.querySelectorAll('.path-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}
function setF(type,val,btn){filt[type]=val;document.querySelectorAll(`.filter-pill[data-f="${type}"]`).forEach(p=>p.classList.remove('active'));btn.classList.add('active');render();}
function applyFilters(){q=document.getElementById('searchInput').value;render();}
function resetAll(){activePath='all';filt={sila:'all',typ:'all'};q='';document.getElementById('searchInput').value='';document.querySelectorAll('.path-btn').forEach(b=>b.classList.remove('active'));document.querySelector('.path-btn[data-path="all"]').classList.add('active');document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.filter-pill[data-v="all"]').forEach(p=>p.classList.add('active'));render();}
function toggleState(hdr){const c=hdr.nextElementSibling,t=hdr.querySelector('.state-toggle');if(c.classList.contains('collapsed')){c.style.maxHeight='none';c.classList.remove('collapsed');t.classList.remove('collapsed');}else{c.classList.add('collapsed');t.classList.add('collapsed');}}

let activeTab='mapa';
function switchTab(tab){activeTab=tab;document.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));document.getElementById('stab-'+tab).classList.add('active');
  const tb=document.querySelector('.topbar'),sb=document.querySelector('.statsbar');
  if(tab==='mapa'){tb.style.display='';sb.style.display='';render();}
  else if(tab==='lista'){tb.style.display='';sb.style.display='none';renderList();}
  else{tb.style.display='none';sb.style.display='none';renderInfo();}}
const SO={green:0,yellow:1,red:2};
function renderList(){
  const arr=ART.filter(vis).sort((a,b)=>SO[a.sila]-SO[b.sila]||a.p.localeCompare(b.p)||a.nr-b.nr);
  let rows='',last='';
  for(const a of arr){
    if(a.sila!==last){rows+=`<div class="list-section-head">${SE[a.sila]} ${SL[a.sila]}</div>`;last=a.sila;}
    rows+=`<div class="list-item" data-nr="${a.nr}"><div class="list-nr">${a.p}·#${a.nr}</div><div style="flex:1"><div class="list-title">${a.t}</div><div class="list-badges"><span style="font-size:11px;color:var(--text-secondary)">→ ${a.angle}</span></div></div></div>`;
  }
  document.getElementById('contentArea').innerHTML=`<div class="list-view"><div class="list-toolbar"><div class="list-progress"><div class="list-progress-label">${arr.length} pytań (wg siły)</div></div><button class="copy-btn" onclick="copyList()">📋 Kopiuj (pytanie → angle)</button></div>${rows||'<div style="padding:20px;color:var(--text-muted)">Brak.</div>'}</div>`;
}
function copyList(){const arr=ART.filter(vis).sort((a,b)=>SO[a.sila]-SO[b.sila]);const txt=arr.map(a=>`${SE[a.sila]} [${a.p}] ${a.t}\n   → ${a.angle}`).join('\n\n');navigator.clipboard.writeText(txt).then(()=>{const b=document.querySelector('.copy-btn');b.textContent='✓ Skopiowano';setTimeout(()=>b.textContent='📋 Kopiuj (pytanie → angle)',2000);});}
function renderInfo(){
  document.getElementById('contentArea').innerHTML=`<div class="info-view">
<h2>🎯 Co to jest</h2>
<p>Mapa <b>odpowiedzi</b> — nie plan treści, lecz strategia: jak na KAŻDE pytanie klienta (z danej ścieżki, na danym etapie) odpowiedzieć, żeby przekierować na zakup marki. Każda karta = pytanie + <b>siła wejścia</b> + <b>angle</b> (operacyjna instrukcja dla copywritera GEO).</p>
<h2>🟢🟡🔴 Siła wejścia</h2>
<ul>
<li><b style="color:#16a34a">🟢 mocne</b> — marka naturalnie wygrywa (pielęgnacja, wygoda, szybkość) + blokery typu „czy hybryda niszczy" (brama na nasz teren). Atakujemy wprost.</li>
<li><b style="color:#d97706">🟡 reframe</b> — klient startuje z innego terenu; przekuwamy oś (na zdrowie/wygodę/koszt).</li>
<li><b style="color:#dc2626">🔴 do dopracowania</b> — kąt trudny/naciągany (klient mocno na terenie hybrydy: trwałość, zestaw, nail-art). Karta i tak MA próbę angle — 🔴 to flaga „przemyśl/dopracuj ręcznie", nie „odpuść". Każde pytanie da się jakoś podpiąć.</li>
</ul>
<h2>🛣 Ścieżki = sytuacje wejścia (CEP)</h2>
<p>Każda ścieżka to inna sytuacja, w której klient zaczyna szukać — nie segment demograficzny. Etapy w ścieżce = poziomy świadomości (od „nie wiem" do zakupu). Generator: <code>perception_paths_v4</code> (pytania) + <code>gen_angle</code> (kąty) + <code>render_mapa</code> (ta mapa).</p>
<h2>📖 Jak używać</h2>
<ul><li>Filtruj <b>🟢 + dana ścieżka</b> → gdzie i jak atakować najpierw.</li><li><b>🔴</b> → pytania których nie przekręcaj na siłę (zaufanie > nachalność).</li><li>LISTA → eksport pytanie → angle do briefu treści.</li></ul>
</div>`;
}
render();
</script></body></html>
