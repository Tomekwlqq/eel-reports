 h+=`<div class="lstep"><span class="lv">${n(totT)}</span><span class="ll">Zakup</span><span class="ld">−${(100-totT/Math.max(totA,1)*100).toFixed(0)}% od ATC</span></div>`;
 h+=`<div class="lstep"><span class="lv">${money(totR)}</span><span class="ll">Przychód</span></div>`;
 h+='</div>';

 h+='<div class="note"><b>⚠️ Dwa ślepe pola, które trzeba znać czytając ten raport:</b><br>1. <b>„Nieprzypisane wejścia (not set)"</b> to NIE koszyk ani cart-recovery — to wejścia, którym GA4 nie nadał strony lądowania (mix Direct/Organic/Paid). Duża liczba = artefakt atrybucji, nie realna ścieżka. NIE czytać jako jednej ścieżki.<br>2. <b>ATC bez ścieżki strony:</b> event „dodaj do koszyka" nie niesie pagePath → nie da się rozróżnić, czy ATC padło z PDP czy z kafelka listingu. Sekwencję listing→PDP→zakup itemu widać (eventy niosą produkt), ale punkt dodania — nie. Naprawa = parametr źródła w GTM (GTM-PQ9JFT2).</div>';

 document.getElementById('report').innerHTML=h;
 document.getElementById('src').innerHTML='Źródło: GA4 342844459, landingPage→typ ścieżki × sessions/addToCarts/transactions/revenue. Ścieżki bez zakupu (bounce) usunięte. „Koszyk/Direct/Other"=(not set), wejścia bez przypisanego landingu (mail/remarketing/paid). Kroki Koszyk/Checkout z lejka ogólnego — per-ścieżka ATC-atrybucja niedostępna (ślepe pole GTM).';
}
const mc=document.getElementById('months');
PERIODS.forEach(([k,label])=>{const b=document.createElement('button');b.className='month-btn'+(k===cur?' active':'');b.textContent=label;b.onclick=()=>{cur=k;document.querySelectorAll('.month-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');render();};mc.appendChild(b);});
render();
</script></body></html>
