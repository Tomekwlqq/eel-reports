<!DOCTYPE html><html lang="pl"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pumeksy do stóp — Vision Scan v5 (5 konkurentów)</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#fff;color:#1e293b;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:10px 20px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap}
.client-name{font-size:16px;font-weight:800;color:#0f172a}
.scan-meta{color:#94a3b8;font-size:11px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.health-strip{display:flex;gap:10px;font-size:12px;font-weight:600;color:#334155}

.tabs-bar{padding:6px 20px;background:#f8fafc;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:6px;flex-shrink:0;overflow-x:auto}
.tab-btn{padding:6px 14px;background:#fff;border:1px solid #e2e8f0;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;color:#64748b;transition:.1s;white-space:nowrap}
.tab-btn.active{background:#0f172a;color:#fff;border-color:#0f172a}
.tabs-spacer{margin-left:auto}
.toggle-group{display:flex;border:1px solid #e2e8f0;border-radius:6px;overflow:hidden}
.tbtn{padding:5px 12px;background:#fff;border:none;cursor:pointer;font-size:12px;font-weight:500;color:#64748b}
.tbtn.active{background:#0f172a;color:#fff}

.split-view{display:flex;flex:1;overflow:hidden}
.split-list{flex:0 0 58%;overflow-y:auto;background:#fff;padding:8px 0}
.split-shot{flex:0 0 42%;border-left:2px solid #e2e8f0;overflow-y:auto;background:#f8fafc;scroll-behavior:smooth}
.shot-img{display:block;margin:20px auto}
.shot-img.mobile{width:390px;max-width:390px}
.shot-img.desktop{width:100%;max-width:100%}

.wnioski-banner{margin:0 16px 12px;border-radius:8px;overflow:hidden;border:1px solid #fecaca}
.wnioski-header{padding:10px 14px;background:#fef2f2;color:#991b1b;font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.wnioski-body{padding:10px 14px;background:#fff}
.alarm-card{border-left:3px solid #dc2626;background:#fef2f2;border-radius:0 6px 6px 0;padding:10px 12px;margin-bottom:10px}
.alarm-problem{font-weight:700;color:#0f172a;margin-bottom:6px;font-size:13px}
.alarm-insight{color:#475569;font-size:12.5px;line-height:1.6}
.dz-block{background:#eff6ff;border-left:3px solid #3b82f6;border-radius:0 6px 6px 0;padding:10px 12px}

.el-item{border-bottom:1px solid #f1f5f9}
.el-row{cursor:pointer;padding:11px 16px;display:flex;align-items:center;gap:10px;transition:background .1s}
.el-row:hover{background:#f0f9ff}
.el-row.active{background:#e0f2fe}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.el-name{font-weight:700;color:#0f172a;flex-shrink:0}
.el-etyk{color:#94a3b8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:40%;flex:1}
.zone-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;flex-shrink:0}
.el-top{color:#94a3b8;font-size:11px;flex-shrink:0}
.chevron{margin-left:auto;color:#94a3b8;flex-shrink:0;transition:transform .15s}
.el-row.expanded .chevron{transform:rotate(180deg)}

.el-accordion{background:#fafafa;padding:4px 20px 12px 40px;display:none}
.el-row.expanded+.el-accordion{display:block}
.acc-section{padding:8px 0}
.acc-title{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#94a3b8;margin-bottom:5px}
.acc-content{font-size:13px;color:#334155;line-height:1.6}
.acc-zaw{color:#334155;font-size:13px;line-height:1.6}
.acc-zaw ul{margin:3px 0;padding-left:16px}.acc-zaw li{margin:2px 0}
.obs-insight{background:#faf5ff;color:#4c1d95;padding:8px 10px;border-left:2px solid #a78bfa;border-radius:4px;font-size:13px;line-height:1.6;margin:4px 0}
.acc-footer{color:#94a3b8;font-size:10.5px;padding-top:6px}

@media(max-width:899px){
  body{height:auto;overflow:visible}
  .split-view{flex-direction:column;overflow:visible}
  .split-shot{order:-1;flex:0 0 auto;position:sticky;top:0;z-index:10;max-height:38vh;border-left:none;border-bottom:2px solid #e2e8f0}
  .split-list{order:1;flex:0 0 auto;overflow:visible}
}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <span class="client-name">Pumeksy do stóp</span>
    <span class="scan-meta"> — Vision Scan v5 — 5 konkurentów — 2026-07-21 — Playwright capture</span>
  </div>
  <div class="topbar-right">
    <div class="health-strip"><span class="health-item">🔴4</span><span class="health-item">🟠1</span></div>
  </div>
</div>

<div class="tabs-bar">
  <button class="tab-btn active" data-i="0" onclick="switchTab(0,this)">GLOV</button>
  <button class="tab-btn" data-i="1" onclick="switchTab(1,this)">Scholl</button>
  <button class="tab-btn" data-i="2" onclick="switchTab(2,this)">KillyS</button>
  <button class="tab-btn" data-i="3" onclick="switchTab(3,this)">NeoNail</button>
  <button class="tab-btn" data-i="4" onclick="switchTab(4,this)">Deni Carte</button>
  <div class="tabs-spacer"></div>
  <div class="toggle-group">
    <button class="tbtn" onclick="setVP('desktop')">🖥 Desktop</button>
    <button class="tbtn active" onclick="setVP('mobile')">📱 Mobile</button>
  </div>
</div>

<div class="split-view" id="splitView">
  <div class="split-list" id="listContainer"></div>
  <div class="split-shot" id="shotContainer">
    <img class="shot-img mobile" id="shotImg" src="" alt="screenshot">
    <div style="text-align:center;font-size:11px;color:#94a3b8;padding:8px" id="shotNote">Wybierz konkurenta z zakładek</div>
  </div>
</div>

<script>
var currentVP = 'mobile';
var currentComp = 0;

var COMPETITORS = [
  {
    name:'GLOV Nano Glass', url:'screens/glov', health:'#eab308', badge:'above',
    alarms:[
      {p:'Brak USP w first-fold', i:'Laser 3D to unikalna cecha — zakopana w bulletach, nie w leadzie. AI nie ma jak odróżnić GLOV od budżetówki.'},
      {p:'Cross-sell kanibalizuje', i:'Karuzela promuje Fusswohl od 6 zł — klient który się waha widzi tańszą alternatywę.'}
    ],
    els:[
      {name:'Galeria zdjęć', etyk:'4 zdjęcia · packshot + lifestyle', zone:'above', top:[90,120],
       z:'<ul><li>4 zdjęcia: packshot, kąt, użycie na stopie (lifestyle), opakowanie tył</li><li>Klikalne → lightbox z zoomem</li><li>Ikona serca (ulubione) nad galerią</li></ul>',
       o:'<div class="obs-insight">Jedno z 4 zdjęć pokazuje produkt w użyciu — to wyróżnia GLOV od Scholl (tylko packshoty). Brak before/after — w tej kategorii najsilniejszy dowód.</div>',
       c:'<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#16a34a;margin-right:4px"></span> OK — 4 zdjęcia, w tym lifestyle.'},
      {name:'Cena + CTA', etyk:'40,99 zł · Dodaj do koszyka', zone:'above', top:[340,460],
       z:'<ul><li>H1: "Glov Pumeks do stóp z nano szkła, Różowy"</li><li>Cena: 40,99 zł (promo), przekreślona 49,99 zł</li><li>Czerwony przycisk "Dodaj do koszyka"</li><li>Informacja o dostawie: 2-3 dni, darmowa od 199 zł</li></ul>',
       o:'<div class="obs-insight">Brak leadu różnicującego nad ceną. "Laserowo cięte nano szkło 3D" pojawia się dopiero w accordionie. W first-fold jest tylko nazwa i cena.</div>',
       c:'<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#eab308;margin-right:4px"></span> POPRAW — brak USP w first-fold.'},
      {name:'Opis (rozwinięty)', etyk:'6 bulletów · skład · instrukcja', zone:'scroll', top:[680,900],
       z:'<ul><li>Opis: na mokro/sucho, bez bałaganu, higieniczny, ergonomiczny, trwały, laser 3D</li><li>Skład: Nano Glass, ABS · Wymiary: 10,5×6,5 cm</li><li>Wegański · Instrukcja 3 kroki</li><li>Producent: Phenicoptere, Warszawa · EAN: 5907440743021</li></ul>',
       o:'<div class="obs-insight">Po rozwinięciu content bogaty. Problem: na Rossmann accordion domyślnie zamknięty. AI/scraper bez JS nie widzi tej treści.</div>',
       c:'<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#3b82f6;margin-right:4px"></span> SPRAWDŹ — czy Rossmann renderuje accordion w HTML (display:none)?'},
      {name:'Cross-sell', etyk:'Tańsze alternatywy', zone:'scroll', top:[1200,1600],
       z:'<ul><li>Karuzela 4 produktów: Ewa Schmitt (29 zł), Fusswohl (6-10 zł)</li><li>Każdy: zdjęcie, ocena 4.8-4.9★, cena, ATC</li></ul>',
       o:'<div class="obs-insight">Promuje produkty od 6,29 zł — tańsze niż GLOV (41 zł). Klient który się waha widzi tańszą alternatywę w tej samej karuzeli. Brak cross-sellu premium.</div>',
       c:'<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#dc2626;margin-right:4px"></span> ALARM — kanibalizuje sprzedaż.'}
    ]
  },
  {
    name:'Scholl Nano Glass', url:'screens/scholl', health:'#16a34a', badge:'above',
    alarms:[
      {p:'Tylko 2 zdjęcia — najuboższa galeria', i:'Scholl pokazuje tylko opakowanie (przód i tył). Zero zdjęć w użyciu, zero kontekstu. AI nie widzi produktu z każdej strony.'},
      {p:'Alert: NIE dla cukrzyków (jedyny fakt S2)', i:'To jedyny cytowalny fakt medyczny w całej kategorii. Ale jest schowany w accordionie na końcu strony.'}
    ],
    els:[
      {name:'Galeria', etyk:'2 zdjęcia · tylko opakowanie', zone:'above', top:[90,120],
       z:'<ul><li>Tylko 2 zdjęcia: opakowanie przód i tył</li><li>Brak zdjęcia w użyciu, brak lifestyle</li><li>Najuboższa galeria w segmencie nano</li></ul>',
       o:'<div class="obs-insight">GLOV ma 4 zdjęcia (w tym lifestyle), Scholl ma tylko 2. To fundamentalna różnica — AI ma mniej kontekstu wizualnego.</div>',
       c:'<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#dc2626;margin-right:4px"></span> ALARM — za mało zdjęć.'},
      {name:'Cena + Trust', etyk:'49,99 zł · Scholl brand 100+ lat', zone:'above', top:[340,460],
       z:'<ul><li>Cena: 49,99 zł (najwyższa w nano)</li><li>Trust marki: Scholl 100+ lat</li><li>Ostrzeżenie: "NIE dla diabetyków i problemów z krążeniem"</li></ul>',
       o:'<div class="obs-insight">Scholl to jedyny konkurent z ostrzeżeniem medycznym. To cytowalny fakt S2: AI może zacytować "Scholl Expert Care Nano Glass nie jest odpowiedni dla cukrzyków". Reszta konkurentów nie ma takiego warningu.</div>',
       c:'<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#16a34a;margin-right:4px"></span> OK — trust marki + fakt S2.'}
    ]
  },
  {
    name:'KillyS Nano', url:'screens/killys', health:'#16a34a', badge:'above',
    alarms:[
      {p:'Brak ceny i ATC na własnym PDP', i:'KillyS.pl to PDP informacyjny (brand site). Cena tylko na dm.pl. AI nie dostaje pełnej informacji zakupowej z jednej strony.'}
    ],
    els:[
      {name:'Opis benefitowy', etyk:'Narracja zamiast listy feature', zone:'above', top:[200,300],
       z:'<ul><li>Opis: "Zadbaj o swoje stopy dzięki tarce z nanoszkła!" — benefit-first</li><li>4 bullety: nano szkło, gradacja 100, rączka, design</li><li>Instrukcja: 2 kroki (widoczna na stronie, nie w accordionie)</li></ul>',
       o:'<div class="obs-insight">Jedyny PDP z treścią benefitową zamiast suchej listy cech. AI łatwiej sparafrazuje "zostawiając skórę zadbaną" niż techniczną specyfikację.</div>',
       c:'<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#16a34a;margin-right:4px"></span> OK — benefit-first copy.'},
      {name:'Brak ceny/ATC', etyk:'PDP informacyjny', zone:'above', top:[100,150],
       z:'<ul><li>Brak ceny na własnej stronie (tylko kod produktu)</li><li>Brak przycisku ATC</li><li>Cena dostępna tylko na dm.pl (24,95 zł)</li></ul>',
       o:'<div class="obs-insight">To jest PDP brandowy (informacyjny), nie transakcyjny. AI może opisać produkt, ale nie podać ceny. Klient musi przejść na dm.pl żeby kupić.</div>',
       c:'<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#eab308;margin-right:4px"></span> POPRAW — brak ceny ogranicza użyteczność dla AI.'}
    ]
  },
  {
    name:'NeoNail Elektryczny', url:'screens/neonail', health:'#dc2626', badge:'above',
    alarms:[
      {p:'Zero widocznego contentu (accordion zamknięty)', i:'Opis, specyfikacja, instrukcja — wszystko w accordionie. Ale Rossmann nie otworzył go domyślnie.'},
      {p:'Cena 140 zł bez uzasadnienia', i:'3× droższy od nano, ale AI nie ma jak uzasadnić ceny — brak danych o żywotności, czasie pracy, IPX7.'}
    ],
    els:[
      {name:'Galeria + zestaw', etyk:'5 zdjęć · produkt + akcesoria', zone:'above', top:[90,120],
       z:'<ul><li>5 zdjęć: produkt, akcesoria (USB, 3 tarcze, szczoteczka), użycie, opakowanie</li><li>Najbogatszy zestaw akcesoriów w kategorii</li><li>Tag "TYLKO U NAS" (exclusive Rossmann)</li></ul>',
       o:'<div class="obs-insight">5 zdjęć + akcesoria to najbogatszy wizualnie zestaw. Ale żaden obraz nie pokazuje efektu przed/po, który jest kluczowy dla kategorii.</div>',
       c:'<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#eab308;margin-right:4px"></span> POPRAW — bogaty zestaw, brak przed/po.'},
      {name:'Cena wysoka, zero treści', etyk:'139,99 zł · brak opisu', zone:'above', top:[340,460],
       z:'<ul><li>Cena: 139,99 zł (3× wyższa od nano)</li><li>Ocena: 5★ (4 opinie)</li><li>Brak widocznego opisu (accordion zamknięty)</li><li>Brak specyfikacji: IPX7, 150min, USB-C (są w HTML ale niewidoczne)</li></ul>',
       o:'<div class="obs-insight">AI widzi cenę 140 zł ale nie ma jak jej uzasadnić. Wszystkie atuty (wodoodporność, długi czas pracy, 3 tarcze) są schowane. Dla AI to "drogi produkt bez wyjaśnienia".</div>',
       c:'<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#dc2626;margin-right:4px"></span> ALARM — cena bez uzasadnienia.'}
    ]
  },
  {
    name:'Deni Carte Gold', url:'screens/deni', health:'#dc2626', badge:'scroll',
    alarms:[
      {p:'Najsłabszy content w kategorii', i:'Zero narracji, zero FAQ, zero instrukcji. Tylko cena i ocena są dla AI użyteczne. Ceneo/Allegro zablokowane (DataDome).'}
    ],
    els:[
      {name:'Cena + ocena', etyk:'~17 zł · 4.95★ (221 opinii)', zone:'above', top:[50,80],
       z:'<ul><li>Cena: ~17 zł (najtańsze nano)</li><li>Ocena: 4.95★, 221 opinii (najwięcej w segmencie)</li><li>10 zdjęć (same packshoty na białym tle)</li><li>Opis funkcjonalny: antypoślizg, łatwe czyszczenie</li></ul>',
       o:'<div class="obs-insight">Najtańszy + najwyżej oceniany = "budżetowy hit". Ale żadnego kontekstu ani różnicowania. AI widzi tylko gołe dane. Keyword-stuffing w tytule (allegro) — AI rozpoznaje to jako spam.</div>',
       c:'<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#dc2626;margin-right:4px"></span> ALARM — zero contentu, tylko cena i ocena.'}
    ]
  }
];

function switchTab(i, btn) {
  currentComp = i;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList(i);
  updateShot(i);
}

function renderList(i) {
  var c = COMPETITORS[i];
  var html = '';
  
  // Wnioski banner
  if (c.alarms && c.alarms.length) {
    html += '<div class="wnioski-banner"><div class="wnioski-header" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'"><span>⚠️ Wnioski ('+c.alarms.length+')</span><span>⌄</span></div><div class="wnioski-body">';
    c.alarms.forEach(function(a) {
      html += '<div class="alarm-card"><div class="alarm-problem">'+a.p+'</div><div class="alarm-insight">'+a.i+'</div></div>';
    });
    html += '</div></div>';
  }
  
  c.els.forEach(function(el, idx) {
    var zoneColor = el.zone === 'above' ? '#16a34a22;color:#16a34a' : '#3b82f622;color:#3b82f6';
    html += '<div class="el-item"><div class="el-row" data-idx="'+idx+'" onclick="rowClick(this,'+el.top[0]+','+el.top[1]+')">';
    html += '<span class="dot" style="background:'+(idx===0?'#16a34a':'#eab308')+'"></span>';
    html += '<span class="el-name">'+el.name+'</span>';
    html += '<span class="el-etyk" title="'+el.etyk+'">'+el.etyk+'</span>';
    html += '<span class="zone-badge" style="background:'+zoneColor+'">'+el.zone+'</span>';
    html += '<span class="el-top">'+el.top[0]+'px</span>';
    html += '<span class="chevron">⌄</span></div>';
    html += '<div class="el-accordion">';
    html += '<div class="acc-section"><div class="acc-title">Zawartość / akcje</div><div class="acc-content"><div class="acc-zaw">'+el.z+'</div></div></div>';
    html += '<div class="acc-section"><div class="acc-title">Obserwacje</div><div class="acc-content">'+el.o+'</div></div>';
    html += '<div class="acc-section"><div class="acc-title">Ocena</div><div class="acc-content">'+el.c+'</div></div>';
    html += '<div class="acc-footer">Position: '+el.top[0]+'px</div></div></div>';
  });
  
  document.getElementById('listContainer').innerHTML = html;
}

function updateShot(i) {
  var c = COMPETITORS[i];
  var img = document.getElementById('shotImg');
  var note = document.getElementById('shotNote');
  var vp = currentVP === 'desktop' ? 'desktop' : 'mobile';
  img.src = c.url + '_' + vp + '.png';
  img.className = 'shot-img ' + vp;
  img.onerror = function() { img.src = ''; note.textContent = '❌ Screenshot niedostępny dla ' + c.name; };
  img.onload = function() { note.textContent = c.name + ' · ' + vp; };
  document.getElementById('shotContainer').scrollTo({top:0});
}

function setVP(vp) {
  currentVP = vp;
  document.querySelectorAll('.toggle-group .tbtn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  updateShot(currentComp);
}

function rowClick(el, topDesk, topMob) {
  var expanded = el.classList.contains('expanded');
  document.querySelectorAll('.el-row').forEach(r => r.classList.remove('active','expanded'));
  if (!expanded) {
    el.classList.add('active','expanded');
    var img = document.getElementById('shotImg');
    var vp = document.getElementById('shotContainer');
    if (!img || !vp) return;
    var scale = currentVP === 'desktop' ? 0.85 : 1.0;
    var actualTop = currentVP === 'desktop' ? topDesk : topMob;
    var offset = Math.max(0, actualTop * scale - vp.offsetHeight * 0.15);
    vp.scrollTo({top: offset, behavior: 'smooth'});
  }
}

// Init
switchTab(0, document.querySelector('.tab-btn'));
</script>
</body></html>
