function explain(key){
  const e = EXPLAIN[key]; if(!e) return '';
  return `<details class="explain-wrap"><summary>Jak czytać ten wykres? (kliknij)</summary>
  <div class="explain">
    <div class="row e1"><div class="lab">Co tu widzisz</div><p>${e.widzisz}</p></div>
    <div class="row e2"><div class="lab">Dlaczego to ważne</div><p>${e.wazne}</p></div>
    <div class="row e3"><div class="lab">Dowiadujesz się że</div><p>${e.dowiadujesz}</p></div>
    <div class="row e4"><div class="lab">Czytaj to tak</div><p>${e.czytaj}</p></div>
    <div class="row e5"><div class="lab">Co z tego wynika i co zrobić</div><p>${e.wynika}</p></div>
  </div></details>`;
}

function render(){
  const d = DATA[cur];
  const k = d.kpi||{};
  document.getElementById('periodLabel').textContent = (d.periods&&d.periods.label)||cur;
  let h = '';

  // R01 KPI
  const crv = k.sessions>0 ? (k.transactions/k.sessions*100).toFixed(2)+'%' : '—';
  const aov = k.transactions>0 ? Math.round(k.revenue/k.transactions) : 0;
  h += `<h2><span class="r">R01</span> Kluczowe metryki</h2>`;
  h += explain('r01');
  h += `<div class="kpis">
    <div class="kpi"><div class="l">Sesje</div><div class="v">${n(k.sessions)}</div></div>
    <div class="kpi"><div class="l">Transakcje</div><div class="v">${n(k.transactions)}</div></div>
    <div class="kpi"><div class="l">Konwersja</div><div class="v">${crv}</div></div>
    <div class="kpi"><div class="l">Przychód</div><div class="v">${money(k.revenue)}</div></div>
    <div class="kpi"><div class="l">AOV</div><div class="v">${n(aov)} zł</div></div>
    <div class="kpi"><div class="l">ATC</div><div class="v">${n(k.add_to_carts)}</div></div>
    <div class="kpi"><div class="l">Checkouts</div><div class="v">${n(k.checkouts)}</div></div>
    <div class="kpi"><div class="l">Bounce</div><div class="v">${pct(k.bounce_rate)}</div></div>
  </div>`;

  // R_FUNNEL
  const f = d.funnel||{};
  const steps=[['session_start','Start sesji'],['view_item','PDP (view_item)'],['add_to_cart','Koszyk'],['begin_checkout','Checkout'],['purchase','Zakup']];
  const fmax = f.session_start||1;
  const cols=['#5b8def','#7c5cff','#f5a623','#ec4899','#3ecf8e'];
  h+=`<h2><span class="r">R-FUNNEL</span> Lejek konwersji</h2><div class="h2sub">drop% = 1 − (krok / poprzedni)</div>`;
  h+=explain('funnel');
  steps.forEach((s,i)=>{
    const v=f[s[0]]||0; const prev=i>0?(f[steps[i-1][0]]||0):v;
    const drop=i>0&&prev>0?(1-v/prev):0;
    h+=`<div class="fbar"><span style="width:${Math.max(v/fmax*100,8)}%;background:${cols[i]}">${s[1]}: ${n(v)}${i>0?'  ·  −'+(drop*100).toFixed(0)+'%':''}</span></div>`;
  });

  h+='<div class="grid2">';
  // R_CHANNELS
  h+='<div><h2><span class="r">R03</span> Kanały</h2>'+explain('r03')+'<table><tr><th>Kanał</th><th>Sesje</th><th>Trans.</th><th>CR</th><th>Przychód</th></tr>';
  (d.channels||[]).slice(0,8).forEach(c=>{h+=`<tr><td>${c.channel}</td><td>${n(c.sessions)}</td><td>${n(c.transactions)}</td><td>${cr(c.transactions,c.sessions)}</td><td>${money(c.revenue)}</td></tr>`;});
  h+='</table></div>';
  // R_DEVICES
  h+='<div><h2><span class="r">R02</span> Urządzenia</h2>'+explain('r02')+'<table><tr><th>Urządzenie</th><th>Sesje</th><th>Trans.</th><th>CR</th></tr>';
  (d.devices||[]).forEach(c=>{h+=`<tr><td>${c.device}</td><td>${n(c.sessions)}</td><td>${n(c.transactions)}</td><td>${cr(c.transactions,c.sessions)}</td></tr>`;});
  h+='</table></div>';
  h+='</div>';

  // R_PRODUCTS
  h+='<h2><span class="r">R05</span> Produkty (top wg zakupów)</h2>'+explain('r05')+'<table><tr><th>Produkt</th><th>Wyśw.</th><th>ATC</th><th>view→ATC</th><th>Kupiono</th><th>Przychód</th></tr>';
  (d.products||[]).slice(0,12).forEach(p=>{
    const r=p.viewed>0?(p.atc/p.viewed*100).toFixed(0)+'%':'—';
    const tag=p.viewed>0&&(p.atc/p.viewed)>=0.4?'t-good':(p.viewed>0&&(p.atc/p.viewed)<0.1?'t-bad':'');
    h+=`<tr><td>${p.name}</td><td>${n(p.viewed)}</td><td>${n(p.atc)}</td><td><span class="tag ${tag}">${r}</span></td><td>${n(p.purchased)}</td><td>${money(p.revenue)}</td></tr>`;
  });
  h+='</table>';

  h+='<div class="grid2">';
  // R_LANDING
  h+='<div><h2><span class="r">R04</span> Landing pages</h2>'+explain('r04')+'<table><tr><th>Strona</th><th>Sesje</th><th>Bounce</th><th>Trans.</th></tr>';
  (d.landing||[]).slice(0,10).forEach(l=>{h+=`<tr><td style="max-width:230px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.landing||l.page||'—'}</td><td>${n(l.sessions)}</td><td>${pct(l.bounce_rate)}</td><td>${n(l.transactions)}</td></tr>`;});
  h+='</table></div>';
  // R_NEWRET
  h+='<div><h2><span class="r">R06</span> Nowi vs wracający</h2>'+explain('r06')+'<table><tr><th>Segment</th><th>Sesje</th><th>Trans.</th><th>CR</th><th>Przychód</th></tr>';
  (d.newret||[]).forEach(s=>{if(s.segment==='(not set)'||s.segment==='(empty)')return;h+=`<tr><td>${s.segment==='new'?'Nowi':'Wracający'}</td><td>${n(s.sessions)}</td><td>${n(s.transactions)}</td><td>${cr(s.transactions,s.sessions)}</td><td>${money(s.revenue)}</td></tr>`;});
  h+='</table></div>';
  h+='</div>';

  // R_DAYOFWEEK
  h+='<h2><span class="r">R09</span> Dni tygodnia</h2>'+explain('r09')+'<table><tr><th>Dzień</th><th>Sesje</th><th>Trans.</th><th>CR</th></tr>';
  const dw=(d.dayofweek||[]).slice().sort((a,b)=>(a.day||a.dow||0)-(b.day||b.dow||0));
  dw.forEach(x=>{const idx=parseInt(x.day!=null?x.day:(x.dow!=null?x.dow:0));h+=`<tr><td>${DOW[idx]||x.day}</td><td>${n(x.sessions)}</td><td>${n(x.transactions)}</td><td>${cr(x.transactions,x.sessions)}</td></tr>`;});
  h+='</table>';

  document.getElementById('report').innerHTML=h;
}

// build month buttons
const mc=document.getElementById('months');
PERIODS.forEach(([k,label])=>{
  const b=document.createElement('button');
  b.className='month-btn'+(k===cur?' active':'');
  b.textContent=label;
  b.onclick=()=>{cur=k;document.querySelectorAll('.month-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');render();};
  mc.appendChild(b);
});
(function(){const root=document.documentElement,btn=document.getElementById('themeBtn');
 const saved=localStorage.getItem('glov-theme')||'dark';root.setAttribute('data-theme',saved);btn.textContent=saved==='light'?'☀️':'🌙';
 btn.onclick=()=>{const nx=root.getAttribute('data-theme')==='light'?'dark':'light';root.setAttribute('data-theme',nx);localStorage.setItem('glov-theme',nx);btn.textContent=nx==='light'?'☀️':'🌙';};})();
render();
</script>
