<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pumeksy do stóp — CS + Mapa Percepcji</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,Segoe UI,sans-serif;background:#f6f8fa;color:#1f2328}
.tabs{display:flex;background:#fff;border-bottom:2px solid #d0d7de;position:sticky;top:0;z-index:100}
.tab{padding:12px 28px;cursor:pointer;font-size:14px;font-weight:600;color:#57606a;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s}
.tab:hover{color:#0969da}
.tab.active{color:#0969da;border-bottom-color:#0969da}
.panel{display:none;padding:0}
.panel.active{display:block}
iframe{width:100%;border:none;height:calc(100vh - 48px)}
.topbar{display:flex;align-items:center;gap:12px;padding:8px 20px;background:#fff;border-bottom:1px solid #d0d7de}
.topbar h1{font-size:16px;font-weight:700;flex:1}
.badge{background:#0969da;color:#fff;border-radius:20px;padding:2px 12px;font-size:11px;font-weight:700}
</style>
</head>
<body>

<div class="tabs">
  <button class="tab active" onclick="switchTab(this,'mapa')">🗺️ Mapa percepcji</button>
  <button class="tab" onclick="switchTab(this,'cs')">📄 Category Standards</button>
  <button class="tab" onclick="switchTab(this,'combined')">🔗 Łączny widok</button>
</div>

<div id="tab-mapa" class="panel active">
  <iframe src="MAPA_PERCEPCJI_pumeksy_v5.5_2.html"></iframe>
</div>

<div id="tab-cs" class="panel">
  <iframe src="cs_pumeksy_v5.7.html"></iframe>
</div>

<div id="tab-combined" class="panel" style="display:flex;height:calc(100vh - 48px)">
  <iframe src="MAPA_PERCEPCJI_pumeksy_v5.5_2.html" style="width:50%;height:100%;border-right:1px solid #d0d7de"></iframe>
  <iframe src="cs_pumeksy_v5.7.html" style="width:50%;height:100%"></iframe>
</div>

<script>
function switchTab(btn, id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
}
</script>
</body>
</html>
