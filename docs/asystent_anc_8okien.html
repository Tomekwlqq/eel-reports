<!DOCTYPE html><html lang=pl><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1">
<title>Asystent ANC — 8 okien</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,Segoe UI,sans-serif;background:#f6f8fa;color:#1f2328;height:100vh;display:flex;flex-direction:column}
.top{padding:10px 16px;background:#fff;border-bottom:1px solid #d0d7de;display:flex;align-items:center;gap:10px}
.top h1{font-size:16px;font-weight:700}
.top .sub{font-size:11px;color:#57606a;flex:1}
.stage-tabs{display:flex;overflow-x:auto;background:#fff;border-bottom:1px solid #d0d7de;flex-shrink:0}
.stage-tab{padding:7px 14px;cursor:pointer;font-size:11px;font-weight:600;color:#57606a;border:none;background:none;border-bottom:2px solid transparent;white-space:nowrap;transition:.15s}
.stage-tab:hover{color:#0969da;background:#f0f3f6}
.stage-tab.active{color:#0969da;border-bottom-color:#0969da;background:rgba(9,105,218,.06)}
.stage-tab .num{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;font-size:9px;font-weight:700;margin-right:4px}
.stage-tab .num.done{background:#0969da;color:#fff}
.stage-tab .num.active{background:#0969da;color:#fff}
.stage-tab .num.wait{background:#e8ecf0;color:#57606a}
.main{flex:1;display:flex;overflow:hidden}
.panel{display:none;flex:1;flex-direction:column}
.panel.active{display:flex}
.panel-content{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px}
.prompt{background:#fff;border:1px solid #d0d7de;border-radius:8px;padding:10px;font-size:12px;margin-bottom:8px;line-height:1.5}
.prompt strong{color:#0969da}
.q-chip{display:inline-block;padding:5px 12px;border-radius:16px;background:rgba(9,105,218,.08);color:#0969da;font-size:12px;cursor:pointer;margin:3px;border:1px solid rgba(9,105,218,.15);transition:.15s}
.q-chip:hover{background:rgba(9,105,218,.15)}
.msg{max-width:80%;padding:8px 12px;border-radius:10px;font-size:13px;line-height:1.5}
.msg.user{align-self:flex-end;background:#0969da;color:#fff;border-bottom-right-radius:3px}
.msg.bot{align-self:flex-start;background:#fff;border:1px solid #d0d7de;border-bottom-left-radius:3px}
.msg .web{font-size:10px;color:#57606a;margin-top:4px;padding-top:4px;border-top:1px dashed #d0d7de}
.msg .web a{color:#0969da;text-decoration:none}
.input-area{display:flex;gap:6px;padding:8px 14px;background:#fff;border-top:1px solid #d0d7de;flex-shrink:0}
.input-area input{flex:1;padding:7px 10px;border:1px solid #d0d7de;border-radius:6px;font-size:13px;outline:none}
.input-area input:focus{border-color:#0969da}
.input-area button{padding:7px 16px;background:#0969da;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
.web-results{background:#fff;border:1px solid #d0d7de;border-radius:8px;padding:8px;margin:4px 0;font-size:11px}
.web-results .src{color:#0969da;font-weight:600}
</style></head><body>

<div class=top>
<h1>🎧 Asystent ANC</h1>
<div class=sub>Słuchawki z ANC · 13 ścieżek · 8 etapów · CS v5.7</div>
</div>

<div class=stage-tabs id=tabs></div>

<div class=main id=panels></div>

<script>
const STAGES = [
  {n:1,t:'Nie wiem',d:'Klient nie wie że potrzebuje ANC. Odkrywanie potrzeby.',c:'#e8ecf0'},
  {n:2,t:'Potrzeba',d:'Mam problem — hałas, cisza, focus. Trigger zakupowy.',c:'#fff3cd'},
  {n:3,t:'CEP',d:'Rozpoznanie ścieżki: commute, showoff, audiofil, sport...',c:'#cce5ff'},
  {n:4,t:'Nauka',d:'ANC, budowa, kodeki — co jest ważne? Jakie są opcje?',c:'#d4edda'},
  {n:5,t:'Preselekcja',d:'Nauszne vs dokanałowe? Który typ dla mnie?',c:'#d4edda'},
  {n:6,t:'Porównanie',d:'Konkretne modele: Sony, Bose, Sennheiser. Rankingi!',c:'#f8d7da'},
  {n:7,t:'Sklep',d:'Gdzie kupić? Ceny, promocje, gwarancja, dostawa.',c:'#f8d7da'},
  {n:8,t:'Zakup',d:'Decyzja. Kupujesz? Może poczekać na promocję?',c:'#e8daef'}
];

const CEPS = [
  {id:'first_anc',l:'Pierwsze ANC',t:'sytuacyjny',trig:'Nigdy nie miałem ANC'},
  {id:'commute',l:'Cisza w podróży',t:'sytuacyjny',trig:'Metro, autobus, hałas'},
  {id:'office',l:'Do pracy — focus',t:'sytuacyjny',trig:'Open space, koncentracja'},
  {id:'showoff',l:'Status i prestiż',t:'tozsamosciowy',trig:'Pokaż się z marką'},
  {id:'audiophile',l:'Audiofil',t:'tozsamosciowy',trig:'Jakość referencyjna'},
  {id:'music',l:'Jakość dźwięku',t:'tozsamosciowy',trig:'Muzyka na co dzień'},
  {id:'multipurpose',l:'Wielozadaniowe',t:'sytuacyjny',trig:'Do wszystkiego'},
  {id:'sport',l:'Do sportu',t:'sytuacyjny',trig:'Bieganie, siłownia'},
  {id:'gaming',l:'Do gamingu',t:'tozsamosciowy',trig:'Niskie opóźnienie'},
  {id:'travel',l:'W podróż',t:'sytuacyjny',trig:'Samolot, długie trasy'},
  {id:'brand',l:'Wierność marce',t:'tozsamosciowy',trig:'Mam ekosystem'},
  {id:'upgrade',l:'Wymiana starych',t:'ekonomiczny',trig:'Upgrade do ANC'},
  {id:'budget',l:'ANC w niskiej cenie',t:'ekonomiczny',trig:'Budżet do 400 zł'}
];

const DQ = [
  // Stage 2-3: Trigger / CEP
  ['Jakie słuchawki z ANC kupić?','Czy ANC rzeczywiście działa?','Ile kosztują dobre słuchawki z ANC?'],
  // Stage 4: Nauka
  ['Jaka jest różnica między ANC adaptacyjnym a hybrydowym?','Czy kodek LDAC jest ważny?','Ile dB redukcji potrzebuję?'],
  // Stage 5: Preselekcja
  ['Nauszne czy dokanałowe — co lepsze do ANC?','Czy ANC w dokanałowych wystarczy?'],
  // Stage 6: Porównanie
  ['Sony WH-1000XM5 vs Bose QC Ultra — które lepsze?','Jaki ranking słuchawek ANC 2026?','Który model do 1000 zł ma najlepsze ANC?'],
  // Stage 7: Sklep
  ['Gdzie kupić najtaniej?','Czy Allegro ma dobre oferty?','Jaka gwarancja?'],
  // Stage 8: Zakup
  ['Czy warto poczekać na promocję?','Który kolor wybrać?','Czy dokupić etui?']
];

let activeStage = 0;

function init(){
  const tabs = document.getElementById('tabs');
  const panels = document.getElementById('panels');
  
  STAGES.forEach((s,i) => {
    // Tab
    const tb = document.createElement('button');
    tb.className = 'stage-tab'+(i===0?' active':'');
    tb.innerHTML = `<span class="num ${i===0?'active':'wait'}">${s.n}</span>${s.t}`;
    tb.onclick = () => switchStage(i);
    tb.id = 'tab-'+i;
    tabs.appendChild(tb);
    
    // Panel
    const p = document.createElement('div');
    p.className = 'panel'+(i===0?' active':'');
    p.id = 'panel-'+i;
    
    // Content
    let html = '<div class=panel-content id=msgs-'+i+'>';
    html += '<div class=prompt style="border-left:3px solid'+s.c+'">';
    html += '<strong>Etap '+s.n+': '+s.t+'</strong><br>'+s.d+'</div>';
    
    // Questions if available
    if(i >= 2 && i <= 7 && DQ[i-2]){
      html += '<div style="font-size:11px;color:#57606a;margin-bottom:4px">Typowe pytania — kliknij żeby zapytać:</div>';
      DQ[i-2].forEach(q => {
        html += `<span class=q-chip onclick="ask(${i},'${q.replace(/'/g,"\\'")}')">${q}</span>`;
      });
    }
    
    // CEP chips for stage 3
    if(i === 2){
      html += '<div style="font-size:11px;color:#57606a;margin:8px 0 4px">Która ścieżka brzmi znajomo?</div>';
      CEPS.forEach(c => {
        html += `<span class=q-chip onclick="ask(${i},'Szukam: ${c.l}')">${c.l}</span>`;
      });
    }
    
    // Welcome message
    if(i === 0){
      html += '<div class="msg bot"><strong>Cześć!</strong> Szukasz słuchawek z ANC? Opisz mi swoją sytuację — pomogę Ci wybrać. Możesz przejść przez etapy po kolei lub skakać między nimi.</div>';
    }
    
    html += '</div>';
    html += '<div class=input-area>';
    html += '<input id=inp-'+i+' placeholder="Zadaj pytanie..." onkeydown="if(event.key===\'Enter\')ask('+i+',this.value)">';
    html += '<button onclick="ask('+i+',document.getElementById(\'inp-'+i+'\').value)">Wyślij</button>';
    html += '</div>';
    
    p.innerHTML = html;
    panels.appendChild(p);
  });
}

function switchStage(i){
  activeStage = i;
  document.querySelectorAll('.stage-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-'+i).classList.add('active');
  document.getElementById('panel-'+i).classList.add('active');
  // Mark as visited
  const num = document.querySelector('#tab-'+i+' .num');
  if(num) num.className = 'num active';
}

function ask(stage, text){
  if(!text || !text.trim()) return;
  const input = document.getElementById('inp-'+stage);
  if(input) input.value = '';
  
  const msgs = document.getElementById('msgs-'+stage);
  
  // User message
  const um = document.createElement('div');
  um.className = 'msg user';
  um.textContent = text;
  msgs.appendChild(um);
  
  // Simulate bot response with CS context + web
  setTimeout(() => {
    const bm = document.createElement('div');
    bm.className = 'msg bot';
    
    // Context-aware response based on stage
    const stageNum = stage + 1;
    let response = '';
    
    if(stageNum <= 3){
      // Trigger/CEP stages - use CS context
      const foundCep = CEPS.find(c => text.toLowerCase().includes(c.l.toLowerCase().slice(0,6)) || text.toLowerCase().includes(c.trig.toLowerCase().slice(0,8)));
      if(foundCep){
        response = `<strong>🧭 Rozpoznaję ścieżkę: ${foundCep.l}</strong> (${foundCep.t})<br><br>`;
        response += `${foundCep.trig} — to świetny punkt startowy. Przejdź do etapu Nauka żeby dowiedzieć się więcej o parametrach ANC.`;
        // Auto-highlight the CEP in stage 3
        switchStage(2);
      } else {
        response = 'Opowiedz więcej o swojej sytuacji — czy chodzi o ciszę w podróży, jakość dźwięku, a może szukasz statusowego modelu?';
      }
    } else if(stageNum === 6){
      // Comparison - add web search results
      response = `<strong>Porównanie modeli z rankingów:</strong><br><br>
      <div class=web-results><span class=src>📊 x-kom ranking:</span> Sony WH-1000XM5 (969 zł) · Bose QC Ultra (1499 zł) · Sennheiser M4 (1199 zł)</div>
      <div class=web-results><span class=src>📊 Ranking słuchawek ANC 2026:</span> 1. Sony WH-1000XM5 · 2. Bose QC Ultra · 3. AirPods Pro 3</div>
      <div class=web-results><span class=src>⭐ Ceneo opinie:</span> Sony 4.7/5 (347 opinii) · Bose 4.6/5 (189 opinii)</div>
      <br>
      <strong>Rekomendacja:</strong> Sony WH-1000XM5 ma najlepszy stosunek ANC/w jakości/ceny. Bose ma lepszy komfort i tryb przezroczystości.`;
    } else if(stageNum === 7){
      response = `<strong>Gdzie kupić — porównanie cen:</strong><br><br>
      <div class=web-results><span class=src>🛒 x-kom:</span> Sony WH-1000XM5 — 969 zł + darmowa dostawa</div>
      <div class=web-results><span class=src>🛒 Allegro:</span> Sony WH-1000XM5 — 939 zł (najniższa cena)</div>
      <div class=web-results><span class=src>🛒 Media Expert:</span> Sony WH-1000XM5 — 999 zł + 24 mce gwarancji</div>`;
    } else if(stageNum === 8){
      response = 'Decyzja należy do Ciebie! Sony WH-1000XM5 to najlepszy wybór overall. Jeśli masz iPhone — AirPods Pro 3 też są świetne. Chcesz żebym podsumował?';
    } else {
      // Learning/preselection
      response = 'Świetne pytanie! ANC (Active Noise Cancelling) działa na zasadę fal przeciwstawnych — mikrofon zbiera hałas, głośnik puszcza odwróconą fazę która go wygasza. <br><br><strong>Kluczowe parametry:</strong><br>• Głębokość ANC: 35-45 dB (premium)<br>• Typ: Adaptacyjny vs Hybrydowy<br>• Kodeki: LDAC &gt; aptX HD &gt; AAC &gt; SBC<br>• Budowa: nauszne (lepsze ANC) vs dokanałowe (bardziej przenośne)';
    }
    
    bm.innerHTML = response;
    msgs.appendChild(bm);
    msgs.scrollTop = msgs.scrollHeight;
    
    // Mark stage as done
    const num = document.querySelector('#tab-'+stage+' .num');
    if(num) num.className = 'num done';
  }, 400);
}

window.onload = init;
</script>
</body></html>
