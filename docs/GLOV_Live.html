<!DOCTYPE html>
<html lang="pl" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLOV Live 🇵🇱 — Dashboard GA4 PL</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root[data-theme="light"]{
  --bg:#f5f6f8;--card:#ffffff;--card2:#eef0f4;--line:#dde1e9;--txt:#1a1d23;
  --muted:#6b7280;--accent:#6044e0;--good:#16a34a;--warn:#d97706;--bad:#dc2626;
  --blue:#2563eb;--shadow:0 1px 4px rgba(0,0,0,.07);
}
:root,:root[data-theme="dark"]{
  --bg:#0f1115;--card:#181b22;--card2:#1e2229;--line:#2a2f3a;--txt:#e8eaed;
  --muted:#6b7280;--accent:#7c5cff;--good:#3ecf8e;--warn:#f5a623;--bad:#ff5c7c;
  --blue:#5b8def;--shadow:0 2px 6px rgba(0,0,0,.3);
}
@media(prefers-color-scheme:light){:root{
  --bg:#f5f6f8;--card:#ffffff;--card2:#eef0f4;--line:#dde1e9;--txt:#1a1d23;
  --muted:#6b7280;--accent:#6044e0;--good:#16a34a;--warn:#d97706;--bad:#dc2626;
  --blue:#2563eb;--shadow:0 1px 4px rgba(0,0,0,.07);
}}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;
  line-height:1.55;padding:0 0 80px;transition:background .25s,color .25s}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;
  border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:50;gap:12px}
.logo{font-size:17px;font-weight:800;white-space:nowrap}.logo b{color:var(--accent)}
.flag{font-size:11px;font-weight:700;color:var(--good);background:rgba(22,163,74,.1);
  padding:2px 9px;border-radius:20px;display:inline-block;margin-left:6px;vertical-align:middle}
.topright{display:flex;align-items:center;gap:10px}
.theme-btn{background:var(--card);border:1px solid var(--line);border-radius:8px;
  width:34px;height:34px;cursor:pointer;font-size:14px}
.chat-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;
  padding:7px 13px;cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap}
.wrap{max-width:1160px;margin:0 auto;padding:20px}
.dpanel{background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:16px;margin-bottom:20px;box-shadow:var(--shadow)}
.dpanel-row{display:flex;flex-wrap:wrap;align-items:flex-end;gap:10px}
.dp-group{display:flex;flex-direction:column;gap:4px}
.dp-group label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.dp-group input[type=date]{background:var(--card2);border:1px solid var(--line);
  border-radius:8px;padding:6px 10px;color:var(--txt);font-size:13px}
.presets{display:flex;flex-wrap:wrap;gap:6px;margin-top:0}
.preset-btn{background:var(--card2);border:1px solid var(--line);border-radius:7px;
  padding:5px 12px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:.15s}
.preset-btn:hover,.preset-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.cmp-toggle{display:flex;align-items:center;gap:7px;font-size:13px;cursor:pointer;user-select:none;margin-left:4px}
.cmp-toggle input{accent-color:var(--accent);width:15px;height:15px}
.cmp-row{display:none;flex-wrap:wrap;gap:10px;margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
.apply-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;
  padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
h2{font-size:16px;font-weight:800;margin:28px 0 2px;display:flex;align-items:center;gap:8px;letter-spacing:-.3px}
.r{font-size:10px;font-weight:800;color:var(--accent);background:rgba(124,92,255,.12);
  padding:2px 7px;border-radius:5px}
.what{color:var(--txt);font-size:13px;margin:3px 0 2px;font-weight:600}
.dl{color:var(--muted);font-size:10.5px;margin:2px 0 10px;font-family:ui-monospace,monospace;
  background:var(--card2);display:inline-block;padding:2px 8px;border-radius:5px;border:1px solid var(--line)}
.alert{background:rgba(220,38,38,.07);border:1px solid rgba(220,38,38,.25);border-radius:10px;
  padding:12px 14px;margin:0 0 18px;font-size:13px;display:none}
.alert b{color:var(--bad)}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:8px 0}
@media(max-width:760px){.kpis{grid-template-columns:1fr 1fr}}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px;box-shadow:var(--shadow)}
.kpi .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.kpi .v{font-size:20px;font-weight:800}.kpi .s{font-size:10px;color:var(--muted);margin-top:2px}
.kpi .d{font-size:11px;font-weight:700;margin-top:3px}
.d-up{color:var(--good)}.d-dn{color:var(--bad)}.d-neu{color:var(--muted)}
table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:4px;overflow-x:auto}
th,td{text-align:right;padding:7px 9px;border-bottom:1px solid var(--line)}
th:first-child,td:first-child{text-align:left}
th{color:var(--muted);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.3px}
tr:hover td{background:var(--card2)}
tr.hot td{background:rgba(22,163,74,.05)}tr.danger td{background:rgba(220,38,38,.05)}
.crpill{font-size:10.5px;font-weight:700;padding:1px 6px;border-radius:5px;white-space:nowrap}
.fbar{height:28px;border-radius:5px;background:var(--card2);overflow:hidden;margin:4px 0}
.fbar span{display:flex;height:100%;border-radius:5px;align-items:center;padding-left:9px;
  font-size:11.5px;font-weight:600;color:#fff;white-space:nowrap}
.concl{border-radius:0 9px 9px 0;padding:12px 14px;margin:12px 0 3px;font-size:12.5px;line-height:1.6}
.concl b{font-weight:700}
.c-red{background:rgba(220,38,38,.06);border-left:3px solid var(--bad)}
.c-amber{background:rgba(217,119,6,.06);border-left:3px solid var(--warn)}
.c-green{background:rgba(22,163,74,.06);border-left:3px solid var(--good)}
.concl .lab{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;
  display:block;margin-bottom:3px;opacity:.8}
.reco{background:var(--card2);border:1px solid var(--line);border-radius:9px;
  padding:11px 13px;margin:7px 0 3px;font-size:12px}
.reco b{color:var(--accent)}.reco .meta{font-size:10.5px;color:var(--muted);margin-top:3px}
.cards2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
.cards3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:8px}
@media(max-width:640px){.cards2,.cards3{grid-template-columns:1fr}}
.dcard{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:14px;box-shadow:var(--shadow)}
.dcard.flag-bad{border-color:rgba(220,38,38,.35)}
.dcard h4{font-size:13px;margin-bottom:7px}
.dcard .big{font-size:25px;font-weight:800}.dcard .row{display:flex;justify-content:space-between;
  font-size:12px;color:var(--muted);margin-top:3px}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;white-space:nowrap}
.b-good{background:rgba(22,163,74,.14);color:var(--good)}.b-warn{background:rgba(217,119,6,.14);
  color:var(--warn)}.b-bad{background:rgba(220,38,38,.14);color:var(--bad)}
.b-blue{background:rgba(37,99,235,.12);color:var(--blue)}
.psb{padding:6px 14px;border:1.5px solid #2C3E50;background:#fff;color:#2C3E50;border-radius:20px;
  cursor:pointer;font-size:12px;font-weight:600;transition:all 0.15s;margin-bottom:4px}
.psb:hover,.psb.psa{background:#2C3E50;color:#fff}
.hbar{display:flex;align-items:flex-end;gap:2px;height:80px;margin-top:8px}
.col-btn{float:right;background:transparent;border:1px solid var(--line);color:var(--muted);
  border-radius:12px;padding:3px 11px;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.15s;margin-left:8px}
.col-btn:hover{background:var(--card2);color:var(--text)}
.rpt-sec.col-collapsed .col-body{display:none}
.rpt-sec.col-collapsed .concl,.rpt-sec.col-collapsed .reco{display:none}
.col-toolbar{display:flex;gap:8px;margin:8px 0 6px}
.col-all-btn{padding:4px 14px;border:1px solid #2C3E50;background:#fff;color:#2C3E50;
  border-radius:14px;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.15s}
.col-all-btn:hover{background:#2C3E50;color:#fff}
.hbar .hb{flex:1;background:var(--accent);border-radius:3px 3px 0 0;min-height:2px;opacity:.75;transition:opacity .15s;cursor:pointer}
.hbar .hb:hover{opacity:1}
.plan .pi{display:flex;gap:11px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--line)}
.plan .pi .pr{font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px;white-space:nowrap;margin-top:2px}
.plan .pi .pv{font-size:13px;font-weight:800;color:var(--good);white-space:nowrap;margin-left:auto;text-align:right}
.ask-widget{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;align-items:flex-end;gap:0}
.ask-panel{width:360px;background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.18);display:flex;flex-direction:column;overflow:hidden;max-height:0;transition:max-height .35s cubic-bezier(.4,0,.2,1);margin-bottom:8px}
.ask-panel.open{max-height:520px}
.ask-head{padding:12px 16px;background:#2C3E50;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ask-head h3{font-size:14px;font-weight:700;color:#fff;margin:0}
.ask-close{background:none;border:none;color:rgba(255,255,255,.7);font-size:18px;cursor:pointer;line-height:1;padding:0}
.ask-msgs{overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;min-height:160px;max-height:280px;background:#fff;flex-shrink:0}
.msg{max-width:85%;padding:8px 12px;border-radius:10px;font-size:12.5px;line-height:1.5;white-space:pre-wrap}
.msg.user{background:#6044e0;color:#fff;align-self:flex-end;border-radius:10px 10px 2px 10px}
.msg.ai{background:#f1f3f5;color:#1a1d23;align-self:flex-start;border-radius:10px 10px 10px 2px}
.msg.typing{background:#f1f3f5;align-self:flex-start;border-radius:10px 10px 10px 2px;padding:10px 14px;display:flex;gap:4px;align-items:center}
.msg.typing span{width:6px;height:6px;border-radius:50%;background:#9ca3af;display:inline-block;animation:tdot 1.2s infinite ease-in-out}
.msg.typing span:nth-child(2){animation-delay:.2s}
.msg.typing span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}
.ask-inp{display:flex;gap:8px;padding:10px 12px;border-top:1px solid #e5e7eb;background:#fff;flex-shrink:0}
.ask-inp input[type=text]{flex:1;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:7px 9px;color:#1a1d23;font-size:12.5px;font-family:inherit}
.ask-send{background:#2C3E50;color:#fff;border:none;border-radius:8px;padding:7px 14px;cursor:pointer;font-weight:600;font-size:12px;align-self:flex-end;transition:transform .15s,background .15s}
.ask-send:active{transform:scale(.92)}
.ask-send.sending{animation:sendbounce .4s ease}
@keyframes sendbounce{0%{transform:scale(1)}30%{transform:scale(.85)}70%{transform:scale(1.08)}100%{transform:scale(1)}}
.ask-key-row{padding:7px 12px 10px;display:flex;gap:7px;align-items:center;border-top:1px solid #e5e7eb;background:#fff;flex-shrink:0}
.ask-key-row input{flex:1;background:#f9fafb;border:1px solid #e5e7eb;border-radius:7px;padding:5px 9px;color:#1a1d23;font-size:12px}
.ask-key-row label{font-size:11px;color:#6b7280;white-space:nowrap}
.src{font-size:10.5px;color:var(--muted);margin-top:32px;padding-top:12px;border-top:1px solid var(--line)}
/* ── Live section ── */
.live-sec{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:20px;box-shadow:var(--shadow)}
.live-tabs{display:flex;gap:8px;margin-bottom:14px}
.live-tab{padding:6px 16px;border-radius:8px;border:1.5px solid var(--line);background:transparent;color:var(--muted);font-size:12.5px;font-weight:600;cursor:pointer;transition:.15s}
.live-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.live-pulse{display:inline-block;width:7px;height:7px;border-radius:50%;background:#ef4444;animation:lpulse 1.4s infinite;margin-right:5px;vertical-align:middle}
@keyframes lpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.8)}}
@keyframes spin{to{transform:rotate(360deg)}}
.sbadge{font-size:9px;font-weight:800;padding:1px 5px;border-radius:4px;vertical-align:middle;line-height:1}
.sbadge-shp{background:#96bf48;color:#fff}.sbadge-ga4{background:#7c5cff;color:#fff}
.lkgrid{display:grid;gap:8px;margin-bottom:10px}
.lkgrid-3{grid-template-columns:repeat(3,1fr)}.lkgrid-4{grid-template-columns:repeat(4,1fr)}
@media(max-width:640px){.lkgrid-3,.lkgrid-4{grid-template-columns:1fr 1fr}}
.lkcard{background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:9px 11px}
.lkcard .ll{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.lkcard .lv{font-size:17px;font-weight:800;line-height:1.2}
.lkcard .ls{font-size:11px;color:var(--muted);margin-top:2px}
.lsep{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:10px 0 6px;display:flex;align-items:center;gap:6px}
.lsep::after{content:'';flex:1;height:1px;background:var(--line)}
.lcols{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
@media(max-width:640px){.lcols{grid-template-columns:1fr}}
.lcol-head{font-size:11px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.live-nodata{color:var(--muted);font-size:12px;padding:12px 0;text-align:center}
.g4funnel{margin:4px 0 8px}
.gfrow{display:grid;grid-template-columns:120px 58px 1fr 115px;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--line)}
.gfrow:last-child{border-bottom:none}
.gfname{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gfcnt{font-size:13px;font-weight:800;text-align:right;color:var(--text);font-variant-numeric:tabular-nums}
.gfbar-wrap{height:22px;background:var(--card2);border-radius:5px;overflow:hidden}
.gfbar{height:100%;border-radius:5px;transition:width .3s ease}
.gfpct{font-size:14px;font-weight:800;text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
.gfpct-lbl{font-size:9px;font-weight:500;color:var(--muted);margin-left:3px}
.gfpct-sub{font-size:10.5px;font-weight:600;color:var(--muted);text-align:right;white-space:nowrap;margin-top:1px;font-variant-numeric:tabular-nums}
@media(max-width:640px){.gfrow{grid-template-columns:90px 42px 1fr 90px;gap:6px}}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">glov<b>.</b>live <span class="flag">🇵🇱 PL only</span></div>
  <div class="topright">
    <button class="chat-btn" id="chatBtn">💬 Ask Assistant</button>
    <button class="theme-btn" id="themeBtn">🌙</button>
  </div>
</div>
<div class="wrap">
  <div class="live-sec">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div style="font-size:14px;font-weight:800"><span class="live-pulse"></span>Live Shopify Raport — Dziś i Wczoraj</div>
      <button id="refreshBtn" onclick="refreshData()" style="background:#2C3E50;color:#fff;border:none;border-radius:7px;padding:5px 12px;cursor:pointer;font-size:12px;font-weight:600">🔄 Odśwież</button>
    </div>
    <div class="live-tabs">
      <button class="live-tab active" onclick="switchLiveTab('today',this)">🔴 Dziś <span id="lt-today-date" style="font-weight:400;font-size:11px"></span></button>
      <button class="live-tab" onclick="switchLiveTab('yesterday',this)">Wczoraj <span id="lt-yesterday-date" style="font-weight:400;font-size:11px"></span></button>
    </div>
    <div id="live-content"></div>
  </div>
  <div class="dpanel">
    <div class="dpanel-row">
      <div class="dp-group">
        <label>Od</label>
        <input type="date" id="dateS" min="2026-01-01" max="2026-07-19">
      </div>
      <div class="dp-group">
        <label>Do</label>
        <input type="date" id="dateE" min="2026-01-01" max="2026-07-19">
      </div>
      <div class="dp-group">
        <label>Preset</label>
        <div class="presets">
          <button class="preset-btn" data-v="today" onclick="preset('today')">Ostatni dzień</button>
          <button class="preset-btn" data-v="7d" onclick="preset('7d')">7 dni</button>
          <button class="preset-btn active" data-v="30d" onclick="preset('30d')">30 dni</button>
          <button class="preset-btn" data-v="ytd" onclick="preset('ytd')">YTD</button>
          <button class="preset-btn" data-v="all" onclick="preset('all')">Cały zakres</button>
        </div>
      </div>
      <label class="cmp-toggle">
        <input type="checkbox" id="cmpOn"> Porównaj z poprzednim
      </label>
      <button class="apply-btn" onclick="applyDates()">Generuj →</button>
    </div>
    <div class="cmp-row" id="cmpRow">
      <div class="dp-group">
        <label>Porównanie Od</label>
        <input type="date" id="cmpS" min="2026-01-01" max="2026-07-19">
      </div>
      <div class="dp-group">
        <label>Porównanie Do</label>
        <input type="date" id="cmpE" min="2026-01-01" max="2026-07-19">
      </div>
    </div>
  </div>
  <div class="alert" id="alertBox"></div>
  <div id="report"></div>
  <div class="src" id="srcInfo">Ładowanie danych...</div>
</div>

<div class="ask-widget">
  <div class="ask-panel" id="askPanel">
    <div class="ask-head">
      <h3>💬 Ask Assistant</h3>
      <button class="ask-close" id="askClose">×</button>
    </div>
    <div class="ask-msgs" id="chatMsgs">
      <div class="msg ai">Cześć! Jestem analitykiem GLOV PL. Pytaj o dane GA4 z bieżącego zakresu — kanały, produkty, lejek, trendy, rekomendacje.</div>
    </div>
    <div class="ask-inp">
      <input type="text" id="chatInput" placeholder="Pytaj o dane... (Enter = wyślij)">
      <button class="ask-send" id="chatSend">Wyślij</button>
    </div>
  </div>
</div>

<div id="loadingOverlay" style="display:none;position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:12px">
  <div style="width:36px;height:36px;border:3px solid #e5e7eb;border-top-color:#2C3E50;border-radius:50%;animation:spin 0.8s linear infinite"></div>
  <div style="font-size:13px;color:#6b7280;font-weight:600">Ładowanie danych...</div>
</div>
<script>
const DOW_PL=['Niedz','Pon','Wt','Śr','Czw','Pt','Sob'];
let DAILY={},META={},LIVE=null,FIRST='',LAST='',LAST30='';

function n(x){return Math.round(x||0).toLocaleString('pl-PL');}
function money(x){return Math.round(x||0).toLocaleString('pl-PL')+' zł';}
function pct(x){return ((x||0)*100).toFixed(1)+'%';}
function crp(v){const c=v>=3?'b-good':v>=1.5?'b-warn':'b-bad';return `<span class="crpill ${c}">${v.toFixed(2)}%</span>`;}
function delta(cur,prev){
  if(!prev||prev===0)return '';
  const d=(cur-prev)/prev*100;const sign=d>=0?'+':'';const cls=d>=0?'d-up':'d-dn';
  return `<div class="d ${cls}">${sign}${d.toFixed(1)}%</div>`;
}

// ── Live section ──────────────────────────────────────────────────────────────

function switchLiveTab(key,btn){
  currentLiveTab=key;
  document.querySelectorAll('.live-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderLive(key);
}

function renderLive(key){
  const data=LIVE?LIVE[key]:null;
  const el=document.getElementById('live-content');
  if(!data){el.innerHTML='<div class="live-nodata">Brak danych — uruchom: <code>python3 glov_etl_live2.py</code></div>';return;}

  const sh=data.shopify||{},g4=data.ga4||{};
  const shk=sh.kpi||{},g4k=g4.kpi||{};
  const ch=data.channels_merged||[];

      const barW=Math.max(v/fmax*100,1).toFixed(0);
      h+=`<div class="gfrow">
        <div class="gfname">${s[1]}</div>
        <div class="gfcnt">${n(v)}</div>

          ${pctPrev?`<div class="gfpct-sub">${pctPrev}<span class="gfpct-lbl">ze&nbsp;${prevLabel}</span></div>`:''}

      </div>`;

  // Channels merged
  if(ch.length){
    h+=`<div class="lsep">Kanały — GA4 vs Shopify UTM</div>
    <div style="overflow-x:auto"><table style="font-size:11.5px">
      <tr>
        <th>Źródło / Medium / Kampania</th>
        <th><span class="sbadge sbadge-ga4">GA4</span></th>
        <th><span class="sbadge sbadge-shp">SHP</span></th>
      </tr>`;
    ch.slice(0,12).forEach(c=>{
      const pair=c.source+'/'+c.medium;
      const camp=(c.campaign&&c.campaign!=='(direct)'&&c.campaign!=='(organic)'&&c.campaign!=='(not set)')
        ?' · '+(c.campaign.length>28?c.campaign.slice(0,28)+'…':c.campaign):'';
      const shS=c.shopify_sessions?n(c.shopify_sessions):'<span style="color:var(--muted)">—</span>';
      h+=`<tr><td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${pair+camp}">${pair}${camp}</td><td>${n(c.ga4_sessions)}</td><td>${shS}</td></tr>`;
    });

  // Products + Landing pages
  h+='<div class="lcols">';

  // Shopify products
  h+=`<div><div class="lcol-head"><span class="sbadge sbadge-shp">SHOPIFY</span>Top produkty (zamówienia)</div>`;
  if(shp.length){
    h+='<table style="font-size:11px"><tr><th>Produkt</th><th>Szt.</th><th>Przychód</th></tr>';

      const nm=p.name.length>35?p.name.slice(0,35)+'…':p.name;

  // GA4 landing pages
  h+=`<div><div class="lcol-head"><span class="sbadge sbadge-ga4">GA4</span>Landing pages</div>`;

    });

  }else{h+='<div class="live-nodata">brak danych</div>';}
  h+='</div>';

  h+='</div>';// .lcols

  initLiveCollapse();
}

const CHAT_WORKER='https://glov-chat.waleqq.workers.dev';
let currentLiveTab='today';
function applyLiveKPI(k){
  if(!k||!LIVE)return;
  ['today','yesterday'].forEach(day=>{
    if(k[day]&&LIVE[day]&&LIVE[day].shopify&&LIVE[day].shopify.kpi){
      const kpi=LIVE[day].shopify.kpi;
      kpi.orders=k[day].orders;
      kpi.gross_sales=k[day].gross_sales;
      kpi.aov=k[day].aov;
    }
  });
}
function fetchLiveKPI(){
  return fetch(CHAT_WORKER,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'live_kpi'})})
    .then(r=>r.ok?r.json():null).then(applyLiveKPI).catch(()=>{});
}

function initLive(){
  if(!LIVE)return;
  const td=document.getElementById('lt-today-date');
  const yd=document.getElementById('lt-yesterday-date');
  if(td&&LIVE.today)td.textContent=LIVE.today.date||'';
  if(yd&&LIVE.yesterday)yd.textContent=LIVE.yesterday.date||'';
  renderLive(currentLiveTab);                                  // od razu ze snapshotu
  fetchLiveKPI().then(()=>renderLive(currentLiveTab));         // potem nadpisz live z Shopify
}

function aggregateRange(s,e){
  const out={
    kpi:{sessions:0,transactions:0,totalRevenue:0,bounceSum:0,bounceSess:0,
         addToCarts:0,checkouts:0,durSum:0,durSess:0},
    channelsMap:{},channelsDetailMap:{},devicesMap:{},funnel:{},productsMap:{},shpProductsMap:{},
    landingMap:{},landingShopifyMap:{},newretMap:{},searchMap:{},hourMap:{},dowMap:{},
    repeat_buyers:META.repeat_buyers||[]
  };
  const dkeys=Object.keys(DAILY).filter(dk=>dk>=s&&dk<=e).sort();
  dkeys.forEach(dk=>{
    const d=DAILY[dk];if(!d)return;
    const k=d.kpi||{};
    out.kpi.sessions    +=k.sessions||0;
    out.kpi.transactions+=(k.shopify_orders!=null?k.shopify_orders:k.transactions)||0;
    out.kpi.totalRevenue+=(k.shopify_revenue!=null?k.shopify_revenue:k.totalRevenue)||0;
    out.kpi.addToCarts  +=k.addToCarts||0;
    out.kpi.checkouts   +=k.checkouts||0;
    if((k.sessions||0)>0){
      out.kpi.bounceSum +=k.bounceRate*(k.sessions);
      out.kpi.bounceSess+=k.sessions;
      out.kpi.durSum    +=(k.avgSessionDuration_s||0)*(k.sessions);
      out.kpi.durSess   +=k.sessions;
    }
    (d.channels||[]).forEach(c=>{
      const m=out.channelsMap[c.channel]||(out.channelsMap[c.channel]={channel:c.channel,sessions:0,transactions:0,revenue:0,durSum:0,durSess:0,ppsSum:0,ppsSess:0});
      m.sessions+=c.sessions||0;m.transactions+=c.transactions||0;m.revenue+=c.revenue||0;
      if((c.sessions||0)>0){m.durSum+=(c.dur||0)*c.sessions;m.durSess+=c.sessions;m.ppsSum+=(c.pps||0)*c.sessions;m.ppsSess+=c.sessions;}
    });
    (d.channels_detail||[]).forEach(c=>{
      const key=(c.source||'')+'|'+(c.medium||'')+'|'+(c.campaign||'');
      const m=out.channelsDetailMap[key]||(out.channelsDetailMap[key]={source:c.source,medium:c.medium,campaign:c.campaign,sessions_ga4:0,sessions_shp:0,sessions:0,transactions:0,revenue:0});
      m.sessions_ga4+=c.sessions||0;m.transactions+=c.transactions||0;m.revenue+=c.revenue||0;
    });
    // Shopify UTM sessions (source of truth dla Meta; Google/cpc = 0 w Shopify)
    (d.channels_shopify||[]).forEach(c=>{
      const key=(c.source||'')+'|'+(c.medium||'')+'|'+(c.campaign||'');
      if(out.channelsDetailMap[key]){
        out.channelsDetailMap[key].sessions_shp+=c.sessions||0;
      } else {
        out.channelsDetailMap[key]={source:c.source,medium:c.medium,campaign:c.campaign,sessions_ga4:0,sessions_shp:c.sessions||0,sessions:0,transactions:0,revenue:0};
      }
    });
    (d.devices||[]).forEach(c=>{
      const m=out.devicesMap[c.device]||(out.devicesMap[c.device]={device:c.device,sessions:0,transactions:0,revenue:0});
      m.sessions+=c.sessions||0;m.transactions+=c.transactions||0;m.revenue+=c.revenue||0;
    });
    const f=d.funnel||{};
    ['session_start','view_item','add_to_cart','begin_checkout','purchase'].forEach(ev=>{
      out.funnel[ev]=(out.funnel[ev]||0)+(f[ev]||0);
    });
    (d.products||[]).forEach(p=>{
      const m=out.productsMap[p.name]||(out.productsMap[p.name]={name:p.name,viewed:0,atc:0,purchased:0,revenue:0});
      m.viewed+=p.viewed||0;m.atc+=p.atc||0;m.purchased+=p.purchased||0;m.revenue+=p.revenue||0;
    });
    (d.products_shopify||[]).forEach(p=>{
      const key=(p.name||'').toLowerCase().trim();
      const m=out.shpProductsMap[key]||(out.shpProductsMap[key]={name:p.name,qty:0,revenue:0});
      m.qty+=p.qty||0;m.revenue+=p.revenue||0;
    });
    (d.landing_shopify||[]).forEach(p=>{
      const m=out.landingShopifyMap[p.page]||(out.landingShopifyMap[p.page]={page:p.page,sessions:0,visitors:0,atc:0,checkout:0});
      m.sessions+=p.sessions||0;m.visitors+=p.visitors||0;m.atc+=p.atc||0;m.checkout+=p.checkout||0;
    });
    (d.landing_atc||[]).forEach(p=>{
      if(/-kopia/i.test(p.page))return; // testowe produkty → skip
      // normalizuj /collections/X/products/Y → /products/Y (dedup duplikatów URL)
      const pg=p.page.replace(/\/collections\/[^/]+\/products\//,'/products/');
      const m=out.landingMap[pg]||(out.landingMap[pg]={page:pg,sessions:0,atc:0,transactions:0,revenue:0});
      m.sessions+=p.sessions||0;m.atc+=p.atc||0;m.transactions+=p.transactions||0;m.revenue+=p.revenue||0;
    });
    (d.newret||[]).forEach(nr=>{
      const m=out.newretMap[nr.segment]||(out.newretMap[nr.segment]={segment:nr.segment,sessions:0,transactions:0,revenue:0});
      m.sessions+=nr.sessions||0;m.transactions+=nr.transactions||0;m.revenue+=nr.revenue||0;
    });
    (d.search||[]).forEach(st=>{
      const m=out.searchMap[st.term]||(out.searchMap[st.term]={term:st.term,count:0,transactions:0});
      m.count+=st.count||0;m.transactions+=st.transactions||0;
    });
    (d.hour||[]).forEach(hr=>{
      const m=out.hourMap[hr.h]||(out.hourMap[hr.h]={h:hr.h,sessions:0,transactions:0});
      m.sessions+=hr.sessions||0;m.transactions+=hr.transactions||0;
    });
    const di=new Date(dk+'T12:00:00').getDay();
    const dm=out.dowMap[di]||(out.dowMap[di]={day:di,sessions:0,transactions:0,revenue:0});
    dm.sessions+=k.sessions||0;
    dm.transactions+=(k.shopify_orders!=null?k.shopify_orders:k.transactions)||0;
    dm.revenue+=(k.shopify_revenue!=null?k.shopify_revenue:k.totalRevenue)||0;
  });
  const kpi=out.kpi;
  kpi.bounceRate=kpi.bounceSess>0?kpi.bounceSum/kpi.bounceSess:0;
  kpi.avgSessionDuration_s=kpi.durSess>0?kpi.durSum/kpi.durSess:0;
  // Wybierz właściwe sessions per kanał: meta→Shopify, google organic→GA4, google/cpc→GA4, reszta→max
  out.channels_detail=Object.values(out.channelsDetailMap).map(c=>{
    const src=(c.source||'').toLowerCase(),med=(c.medium||'').toLowerCase();
    const isMetaPaid=(src==='meta'||src==='facebook')&&med==='cpc';
    const isGooglePaid=src==='google'&&med==='cpc';
    const isGoogleOrganic=src==='google'&&med==='organic';
    const isShopifyTracked=(src==='google'&&med==='product_sync');
    let sessions, sess_src;
    if(isMetaPaid){
      // Meta: Shopify jest source of truth (iOS blokuje GA4)
      sessions=c.sessions_shp||c.sessions_ga4||0; sess_src='shp';
    } else if(isGooglePaid||isGoogleOrganic){
      // Google: GA4 (gclid niewidoczny dla Shopify)
      sessions=c.sessions_ga4||0; sess_src='ga4';
    } else if(isShopifyTracked){
      sessions=c.sessions_shp||0; sess_src='shp';
    } else {
      sessions=Math.max(c.sessions_ga4||0,c.sessions_shp||0);
      sess_src=(c.sessions_shp||0)>=(c.sessions_ga4||0)?'shp':'ga4';
    }
    return {...c, sessions, sess_src};
  }).sort((a,b)=>b.sessions-a.sessions).slice(0,30);
  out.channels=Object.values(out.channelsMap).map(c=>({...c,
    dur:c.durSess>0?c.durSum/c.durSess:0,
    pps:c.ppsSess>0?c.ppsSum/c.ppsSess:0
  })).sort((a,b)=>b.revenue-a.revenue).slice(0,12);
  out.devices=Object.values(out.devicesMap).sort((a,b)=>b.sessions-a.sessions);
  out.products=Object.values(out.productsMap).map(p=>{
    const shp=out.shpProductsMap[(p.name||'').toLowerCase().trim()];
    return {...p,
      purchased:shp!=null?shp.qty:p.purchased,
      revenue:shp!=null?shp.revenue:p.revenue,
      shp_match:shp!=null};
  }).sort((a,b)=>b.purchased-a.purchased).slice(0,15);
  out.landing_atc=Object.values(out.landingMap).sort((a,b)=>b.sessions-a.sessions).slice(0,15);
  out.landing_shopify=Object.values(out.landingShopifyMap).sort((a,b)=>b.sessions-a.sessions).slice(0,15);
  out.newret=Object.values(out.newretMap);
  out.search_terms=Object.values(out.searchMap).sort((a,b)=>b.count-a.count).slice(0,10);
  out.hour=Object.values(out.hourMap).sort((a,b)=>a.h-b.h);
  out.dayofweek=Object.values(out.dowMap).sort((a,b)=>a.day-b.day);
  out.daysCount=dkeys.length;
  return out;
}

function renderKPI(d,cmp){
  const k=d.kpi,ck=cmp&&cmp.kpi;
  const crv=k.sessions?(k.transactions/k.sessions*100):0;
  const aov=k.transactions?Math.round(k.totalRevenue/k.transactions):0;
  const atcP=k.sessions?(k.addToCarts/k.sessions*100):0;
  return `<h2><span class="r">R01</span> Lejek startowy &amp; KPI <span class="badge b-good">🇵🇱 PL</span></h2>
  <div class="what">KPI okresu + sekwencyjny lejek wejście→PDP→koszyk→checkout→zakup.</div>
  <span class="dl">sessions (GA4) · transactions &amp; revenue <span class="sbadge sbadge-shp">SHOPIFY</span> gdy dostępne · addToCarts · bounceRate (GA4) · country=Poland</span>
  <div class="kpis">
    <div class="kpi"><div class="l">Sesje PL <span class="sbadge sbadge-ga4">GA4</span></div><div class="v">${n(k.sessions)}</div>${ck?delta(k.sessions,ck.sessions):''}</div>
    <div class="kpi"><div class="l">Konwersja</div><div class="v" style="color:var(--good)">${crv.toFixed(2)}%</div><div class="s">${n(k.transactions)} zak. <span class="sbadge sbadge-shp">SHP</span></div></div>
    <div class="kpi"><div class="l">Przychód <span class="sbadge sbadge-shp">SHP</span></div><div class="v">${money(k.totalRevenue)}</div>${ck?delta(k.totalRevenue,ck.totalRevenue):''}</div>
    <div class="kpi"><div class="l">AOV</div><div class="v">${n(aov)} zł</div><div class="s">próg darmowej: 150 zł</div></div>
    <div class="kpi"><div class="l">Bounce</div><div class="v">${pct(k.bounceRate)}</div><div class="s">eng. ${pct(1-(k.bounceRate||0))}</div></div>
    <div class="kpi"><div class="l">Sesje z ATC</div><div class="v">${atcP.toFixed(1)}%</div><div class="s">${n(k.addToCarts)} ATC</div></div>
    <div class="kpi"><div class="l">Checkouts</div><div class="v">${n(k.checkouts)}</div>${ck?delta(k.checkouts,ck.checkouts):''}</div>
    <div class="kpi"><div class="l">Dni zakresu</div><div class="v" style="font-size:15px">${d.daysCount}</div></div>
  </div>`;
}

function renderFunnel(d){
  const f=d.funnel||{};
  const steps=[
    ['session_start','Wejście','#5b8def','sesji'],
    ['view_item','PDP (view_item)','#7c5cff','Wejście'],
    ['add_to_cart','Koszyk (ATC)','#d97706','PDP'],
    ['begin_checkout','Checkout','#ec4899','ATC'],
    ['purchase','Zakup','#16a34a','Checkout']
  ];
  const fmax=f.session_start||1;
  let h='',atcDrop=0;
  steps.forEach((s,i)=>{
    const v=f[s[0]]||0;
    const prev=i>0?(f[steps[i-1][0]]||0):v;
    const drop=i>0&&prev>0?(1-v/prev)*100:0;
    if(i===2)atcDrop=drop;
    const isAtc=i===2;
    const barW=Math.max(v/fmax*100,1).toFixed(0);
    // PRIMARY (kolorowa): % ze sesji
    const pctSess=i>0?(v/fmax*100).toFixed(2)+'%':'—';
    // SECONDARY (szara): % ze poprzedniego kroku, tylko i>=2
    const pctPrev=i>=2&&prev>0?((v/prev*100).toFixed(2)+'%'):'';
    h+=`<div class="gfrow">
      <div class="gfname">${s[1]}</div>
      <div class="gfcnt">${n(v)}</div>
      <div class="gfbar-wrap"${isAtc?' style="outline:2px solid var(--bad);outline-offset:-2px"':''}><div class="gfbar" style="width:${barW}%;background:${s[2]}"></div></div>
      <div>
        <div class="gfpct" style="color:${s[2]}">${pctSess}${i>0?`<span class="gfpct-lbl">ze&nbsp;sesji</span>`:''}
        </div>
        ${pctPrev?`<div class="gfpct-sub">${pctPrev}<span class="gfpct-lbl">ze&nbsp;${s[3]}</span></div>`:''}
      </div>
    </div>`;
  });
  const c2p=f.begin_checkout>0?((f.purchase||0)/f.begin_checkout*100).toFixed(0):0;
  h+=`<div class="concl c-red"><span class="lab">Główny wniosek</span><b>PDP→Koszyk: −${atcDrop.toFixed(0)}%</b> — największy leak lejka. Checkout→Zakup ${c2p}% sugeruje szok cenowy dostawy (próg 150 zł).</div>`;
  h+=`<div class="reco"><b>⚙️ Rekomendacja:</b> Quick Add to Cart na kafelkach listingu + sticky CTA pod foldem na PDP.<div class="meta">Właściciel: Dev+PM · 7 dni · miernik: sesje z ATC &gt;12%</div></div>`;
  return `<h2><span class="r">R01b</span> Lejek — drop po kroku</h2><div class="what">Sekwencja w jednej sesji. Czerwona ramka = krok z największą stratą.</div><div class="g4funnel">`+h+'</div>';
}

function renderProducts(d){
  const ps=(d.products||[]).filter(p=>!/free gift/i.test(p.name)).slice(0,30);
  if(!ps.length)return '';
  window._prodData=ps;
  function crBadge(val,hi,lo){
    if(val==null||isNaN(val))return'<span style="color:var(--muted)">—</span>';
    const v=parseFloat(val);
    const cl=v>=hi?'b-good':v>=lo?'b-warn':'b-bad';
    return`<span class="crpill ${cl}">${val.toFixed(1)}%</span>`;
  }
  function renderProdRows(arr){
    return arr.map((p,i)=>{
      const v=p.viewed||0,a=p.atc||0,pu=p.purchased||0;
      const c1=v?a/v*100:null,c2=a?pu/a*100:null;
      const src=p.shp_match?'<span class="sbadge sbadge-shp" title="Shopify">SHP</span>':'<span class="sbadge sbadge-ga4" title="GA4">GA4</span>';

    }).join('');
  }
  window.sortProd=function(key){
    document.querySelectorAll('.psb').forEach(b=>b.classList.remove('psa'));

    const btn=document.getElementById(btnId);if(btn)btn.classList.add('psa');

      if(key==='purchases')return(b.purchased||0)-(a.purchased||0);
      if(key==='views')return(b.viewed||0)-(a.viewed||0);
      if(key==='revenue')return(b.revenue||0)-(a.revenue||0);
      if(key==='cr_va'){const ra=a.atc&&a.viewed?a.atc/a.viewed:-1,rb=b.atc&&b.viewed?b.atc/b.viewed:-1;return rb-ra;}
      if(key==='cr_ap'){const ra=a.purchased&&a.atc?a.purchased/a.atc:-1,rb=b.purchased&&b.atc?b.purchased/b.atc:-1;return rb-ra;}
      return 0;
    });
    const tb=document.getElementById('prod-tbody');
    if(tb)tb.innerHTML=renderProdRows(sorted);
  };
  const h=`<h2><span class="r">R02</span> Produkty — lejek per SKU</h2>
  <div class="what">Pełna ścieżka per produkt: widoki→ATC→zakup. Widoki &amp; ATC z GA4, Zakupy &amp; Przychód z Shopify (source of truth) gdy dostępne — badge wskazuje źródło per wiersz.</div>
  <span class="dl">itemsViewed/ATC <span class="sbadge sbadge-ga4">GA4</span> · Zakupy/Przychód <span class="sbadge sbadge-shp">SHOPIFY</span> gdy dostępne · country=Poland</span>

    <button onclick="sortProd('revenue')" class="psb" id="psb-revenue">💵 Top przychód</button>
    <button onclick="sortProd('cr_va')" class="psb" id="psb-cr-va">🛒 Top CR wizyta→ATC</button>
    <button onclick="sortProd('cr_ap')" class="psb" id="psb-cr-ap">💰 Top CR ATC→zakup</button>
  </div>
  <table><thead><tr><th style="width:32px;text-align:center">#</th><th>Produkt</th><th>Widoki</th><th>ATC</th><th>Zakupy</th><th>Przychód</th><th>CR widz→ATC</th><th>CR ATC→zak</th></tr></thead>
  <tbody id="prod-tbody">${renderProdRows(ps)}</tbody></table>
  <div class="concl c-amber"><span class="lab">Główny wniosek</span>Sprawdź CR widz→ATC per produkt — produkty z niskim CR to problem ekspozycji CTA/Quick Add na PDP. Buttony sortowania powyżej izolują różne wymiary lejka.</div>
  <div class="reco"><b>⚙️ Rekomendacja:</b> Clarity heatmap na PDP top SKU z niskim CR widz→ATC. Kopiuj układ PDP najlepszego produktu.<div class="meta">Właściciel: PM+UX · miernik: CR widz→ATC Luna Eye &gt;30%</div></div>`;
  return h;
}

function renderChannels(d){
  const cd=d.channels_detail||[];
  const cs=d.channels||[];
  if(!cd.length&&!cs.length)return '';

  // Granular label: source/medium · campaign (jeśli niebanalny)
  function chLabel(c){
    const base=(c.source||'?')+'/'+(c.medium||'?');
    const camp=c.campaign&&c.campaign!=='(direct)'&&c.campaign!=='(organic)'&&c.campaign!=='(not set)'?c.campaign:'';
    return camp?base+' · '+camp:base;
  }
  function chVerdict(c){
    const crv=c.sessions>0?c.transactions/c.sessions*100:0;
    const src=(c.source||'').toLowerCase(),med=(c.medium||'').toLowerCase();
    if(src==='google'&&med==='cpc')return ['🌟 Paid Search','b-good'];
    if(src==='meta'&&med==='cpc')return ['📱 Meta Ads','b-warn'];
    if(src==='google'&&med==='organic')return ['🔍 Organic','b-blue'];
    if(src==='(direct)')return ['❓ Direct','b-warn'];
    if(crv>=3)return ['✅ Solid CR','b-good'];
    if(crv>=1.5)return ['• OK','b-blue'];
    return ['▼ Niski CR','b-bad'];
  }

  // View toggle: granular (default) vs coarse
  const hasShpData=cd.some(c=>c.sessions_shp>0);
  let hDetail=`<table><tr><th>Źródło / Medium · Kampania</th><th>Sesje <span style="font-weight:400;font-size:9px" id="r03-sess-src"></span></th>${hasShpData?'<th style="font-size:10px"><span class="sbadge sbadge-ga4">GA4</span></th><th style="font-size:10px"><span class="sbadge sbadge-shp">SHP</span></th>':''}<th>Zakupy</th><th>CR</th><th>Przychód</th><th>Ocena</th></tr>`;
  cd.slice(0,20).forEach(c=>{
    const crv=c.sessions>0?c.transactions/c.sessions*100:0;
    const[v,cl]=chVerdict(c);
    const label=chLabel(c);
    const hot=(c.source||'').toLowerCase()==='google'&&(c.medium||'').toLowerCase()==='cpc'?'hot':'';
    const srcBadge=c.sess_src==='shp'?`<span class="sbadge sbadge-shp">SHP</span>`:`<span class="sbadge sbadge-ga4">GA4</span>`;
    const ga4col=hasShpData?`<td style="color:var(--muted)">${n(c.sessions_ga4)}</td>`:'';
    const shpCol=hasShpData?`<td>${c.sessions_shp?n(c.sessions_shp):'<span style="color:var(--muted)">—</span>'}</td>`:'';
    hDetail+=`<tr class="${hot}"><td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${label}">${label}</td><td><b>${n(c.sessions)}</b> ${srcBadge}</td>${ga4col}${shpCol}<td>${n(c.transactions)}</td><td>${crp(crv)}</td><td>${money(c.revenue)}</td><td><span class="badge ${cl}">${v}</span></td></tr>`;
  });
  hDetail+='</table>';

  let hCoarse='<table><tr><th>Kanał (GA4 grouping)</th><th>Sesje</th><th>Zakupy</th><th>CR</th><th>Przychód</th><th>Czas</th><th>PV/ses</th></tr>';
  cs.slice(0,10).forEach(c=>{
    const crv=c.sessions>0?c.transactions/c.sessions*100:0;
    const dur=c.dur?Math.floor(c.dur/60)+':'+String(Math.round(c.dur%60)).padStart(2,'0'):'—';
    hCoarse+=`<tr><td>${c.channel}</td><td>${n(c.sessions)}</td><td>${n(c.transactions)}</td><td>${crp(crv)}</td><td>${money(c.revenue)}</td><td>${dur}</td><td>${(c.pps||0).toFixed(1)}</td></tr>`;
  });
  hCoarse+='</table>';

  let h=`<h2><span class="r">R03</span> Kanały &amp; jakość ruchu</h2>
  <div class="what">Granularny widok: source/medium/kampania per wiersz. Widoczne każde konto Meta Ads i Google Ads osobno. Toggle → coarse grouping z czasem sesji.</div>
  <span class="dl">sessionSource · sessionMedium · sessionCampaignName · sessions · ecommercePurchases · purchaseRevenue <span class="sbadge sbadge-ga4">GA4</span> · country=Poland</span>
  <div style="display:flex;gap:8px;margin:10px 0 12px">
    <button onclick="r03view('detail',this)" class="psb psa" id="r03-detail">📊 Granularny (source/medium)</button>
    <button onclick="r03view('coarse',this)" class="psb" id="r03-coarse">🗂 Coarse (channel grouping)</button>
  </div>
  <div id="r03-detail-body">${hDetail}</div>
  <div id="r03-coarse-body" style="display:none">${hCoarse}</div>`;

  h+=`<div class="concl c-green"><span class="lab">Jak czytać</span>Każdy wiersz = konkretna kampania/kanał. Paid Search (google/cpc) = najwyższy CR — intencja zakupowa. Meta Ads = wolumen. Direct bez UTM = potencjalny Paid bez tagu.</div>`;
  h+=`<div class="reco"><b>⚙️ Rekomendacja:</b> Kampanie Meta bez transakcji → wyłącz lub retargetuj. Otaguj UTM ruch Direct. Paid Search — skaluj kanał z najwyższym CR.<div class="meta">Właściciel: Performance · miernik: Paid Search CR &gt;3%</div></div>`;
  return h;
}

function renderWindow(d){
  const k=d.kpi||{},f=d.funnel||{};
  const eng=Math.round((k.sessions||0)*(1-(k.bounceRate||0)));
  const atcSes=f.add_to_cart||0;
  const win=Math.max(eng-atcSes,0);
  const aov=k.transactions?k.totalRevenue/k.transactions:130;
  const pot=Math.round(win*0.05*(f.purchase/(atcSes||1))*aov);
  const perDay=d.daysCount>0?Math.round(win/d.daysCount):0;
  return `<h2><span class="r">R08</span> Okno wystawowe (EEL) — window shoppers</h2>
  <div class="what">Ile zaangażowanych sesji PL NIE dodaje nic do koszyka? Engaged − ATC = największy segment do odblokowania.</div>
  <span class="dl">kalkulacja EEL: sesje_engaged (nie-bounce) − sesje_ATC · country=Poland</span>
  <div class="cards3">
    <div class="dcard"><h4>Sesje łącznie</h4><div class="big">${n(k.sessions)}</div></div>
    <div class="dcard"><h4>Engaged (nie-bounce)</h4><div class="big">${n(eng)}</div><div class="row"><span>udział</span><b>${pct(1-(k.bounceRate||0))}</b></div></div>
    <div class="dcard flag-bad"><h4>🪟 Okno wystawowe</h4><div class="big" style="color:var(--bad)">${n(win)}</div><div class="row"><span>~${n(perDay)}/dzień</span><b></b></div></div>
  </div>

  <div class="reco"><b>⚙️ Rekomendacja:</b> Clarity heatmap + scroll na PDP top SKU → sticky ATC pod foldem mobile.<div class="meta">Właściciel: UX · miernik: sesje z ATC &gt;12%</div></div>`;
}

function renderDOW(d){
  const dw=d.dayofweek||[];if(!dw.length)return '';
  const sorted=[...dw].sort((a,b)=>a.day-b.day);
  const top=sorted.reduce((a,b)=>b.revenue>a.revenue?b:a,sorted[0]);
  const worst=sorted.reduce((a,b)=>b.revenue<a.revenue?b:a,sorted[0]);
  const bestCR=sorted.reduce((a,b)=>(b.sessions>0&&b.transactions/b.sessions>a.transactions/a.sessions?b:a),sorted[0]);
  let h=`<h2><span class="r">R09</span> Wzorce — dni tygodnia</h2>
  <div class="what">Kiedy Polacy kupują? Peak day do planowania budżetu kampanii i pushów.</div>
  <span class="dl">dimension dayOfWeek · sessions · transactions · revenue · country=Poland</span>
  <table><tr><th>Dzień</th><th>Sesje</th><th>Zakupy</th><th>CR</th><th>Przychód</th></tr>`;
  sorted.forEach(x=>{
    const cls=x.day===top.day?'hot':(x.day===worst.day?'danger':'');
    const crv=x.sessions>0?x.transactions/x.sessions*100:0;
    h+=`<tr class="${cls}"><td>${DOW_PL[x.day]}</td><td>${n(x.sessions)}</td><td>${n(x.transactions)}</td><td>${crp(crv)}</td><td>${money(x.revenue)}</td></tr>`;
  });
  h+='</table>';
  h+=`<div class="concl c-amber"><span class="lab">Główny wniosek</span><b>${DOW_PL[top.day]} #1 przychodu</b> (${money(top.revenue)}). Najwyższy CR: <b>${DOW_PL[bestCR.day]}</b>. Skaluj kampanie przed peakiem, tnij budżet w ${DOW_PL[worst.day]}.</div>`;
  return h;
}

function renderHour(d){
  const hr=d.hour||[];if(!hr.length)return '';
  const maxS=Math.max(...hr.map(x=>x.sessions||0));
  const peak=hr.reduce((a,b)=>b.sessions>a.sessions?b:a,hr[0]);
  let h=`<h2><span class="r">R10</span> Wzorce — godziny</h2>
  <div class="what">Rozkład ruchu w dobie (PL). Pik = ${peak.h}:00.</div>
  <span class="dl">dimension hour · sessions · country=Poland</span>
  <div class="hbar">`;
  hr.forEach(x=>{const ht=maxS>0?Math.max((x.sessions/maxS*100),2):2;h+=`<div class="hb" style="height:${ht}%" title="${x.h}:00 — ${n(x.sessions)} sesji, ${n(x.transactions)} zak."></div>`;});
  h+='</div><div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:4px"><span>0h</span><span>6h</span><span>12h</span><span>18h</span><span>23h</span></div>';
  return h;
}

function renderReport(s,e,cmpS,cmpE){
  const d=aggregateRange(s,e);
  const cmp=(cmpS&&cmpE)?aggregateRange(cmpS,cmpE):null;
  let h='';
  h+=renderKPI(d,cmp);
  h+=renderFunnel(d);
  h+=renderProducts(d);
  h+=renderChannels(d);
  h+=renderRepeat(d);
  h+=renderLanding(d);
  h+=renderLandingShopify(d);
  h+=renderNewRet(d);
  h+=renderDevices(d);
  h+=renderSearch(d);
  h+=renderWindow(d);
  h+=renderDOW(d);
  h+=renderHour(d);
  h+=renderPlan();
  document.getElementById('report').innerHTML=h;

function initCollapse(){
  const report=document.getElementById('report');
  if(!report)return;
  // Usuń poprzednie wrappery (przy re-generowaniu)
  report.querySelectorAll('.rpt-sec').forEach(sec=>{
    const parent=sec.parentNode;
    while(sec.firstChild)parent.insertBefore(sec.firstChild,sec);
    parent.removeChild(sec);
  });
  // Grupuj dzieci po h2
  const children=Array.from(report.children);
  const sections=[];let cur=null;
  children.forEach(el=>{
    if(el.tagName==='H2'){cur={h2:el,rest:[]};sections.push(cur);}
    else if(cur)cur.rest.push(el);
  });
  sections.forEach(sec=>{
    const wrap=document.createElement('div');
    wrap.className='rpt-sec';
    sec.h2.parentNode.insertBefore(wrap,sec.h2);
    wrap.appendChild(sec.h2);
    // Przycisk toggle
    const btn=document.createElement('button');
    btn.className='col-btn';btn.textContent='▲ Zwiń';
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const c=wrap.classList.toggle('col-collapsed');
      btn.textContent=c?'▼ Rozwiń':'▲ Zwiń';
    });
    sec.h2.appendChild(btn);
    // Wrap treści (bez concl/reco które zostają widoczne)
    const body=document.createElement('div');body.className='col-body';
    const tail=[];
    sec.rest.forEach(el=>{
      if(el.classList.contains('concl')||el.classList.contains('reco'))tail.push(el);
      else body.appendChild(el);
    });
    wrap.appendChild(body);
    tail.forEach(el=>wrap.appendChild(el));
  });
  // Toolbar Zwiń wszystkie / Rozwiń wszystkie
  const al=document.getElementById('alertBox');
  if(al){
    const old=document.getElementById('col-toolbar');if(old)old.remove();
    const tb=document.createElement('div');tb.className='col-toolbar';tb.id='col-toolbar';
    [['Zwiń wszystkie',1],['Rozwiń wszystkie',0]].forEach(([label,collapse])=>{
      const b=document.createElement('button');b.className='col-all-btn';b.textContent=label;
      b.addEventListener('click',()=>{
        document.querySelectorAll('.rpt-sec').forEach(sec=>{
          const btn=sec.querySelector('.col-btn');
          if(collapse){sec.classList.add('col-collapsed');if(btn)btn.textContent='▼ Rozwiń';}
          else{sec.classList.remove('col-collapsed');if(btn)btn.textContent='▲ Zwiń';}
        });
      });
      tb.appendChild(b);
    });
    al.insertAdjacentElement('afterend',tb);
  }
}

function initLiveCollapse(){
  const el=document.getElementById('live-content');
  if(!el)return;
  const children=Array.from(el.children);
  const sections=[];let cur=null;
  children.forEach(child=>{
    if(child.classList.contains('lsep')){cur={hdr:child,rest:[]};sections.push(cur);}
    else if(cur)cur.rest.push(child);
  });
  let active=false;
  sections.forEach(sec=>{
    if(!active&&sec.hdr.textContent.includes('Kanał'))active=true;
    if(!active)return;
    const wrap=document.createElement('div');wrap.className='rpt-sec';
    sec.hdr.parentNode.insertBefore(wrap,sec.hdr);
    const btn=document.createElement('button');
    btn.className='col-btn';btn.style.order='999';btn.textContent='▲ Zwiń';
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const c=wrap.classList.toggle('col-collapsed');
      btn.textContent=c?'▼ Rozwiń':'▲ Zwiń';
    });
    sec.hdr.appendChild(btn);
    wrap.appendChild(sec.hdr);
    const body=document.createElement('div');body.className='col-body';
    sec.rest.forEach(r=>body.appendChild(r));
    wrap.appendChild(body);
  });
}

function preset(v){
  const d=new Date(LAST+'T00:00:00');let s=LAST;
  if(v==='today'){s=LAST;}
  else if(v==='7d'){const t=new Date(d);t.setDate(t.getDate()-6);s=t.toISOString().slice(0,10);}
  else if(v==='30d'){s=LAST30;}
  else if(v==='ytd'){s=LAST.slice(0,4)+'-01-01';}
  else if(v==='all'){s=FIRST;}
  document.getElementById('dateS').value=s;
  document.getElementById('dateE').value=LAST;
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.toggle('active',b.dataset.v===v));
  autoCmp();
  applyDates();
}
function autoCmp(){
  if(!document.getElementById('cmpOn').checked)return;
  const s=document.getElementById('dateS').value,e=document.getElementById('dateE').value;
  if(!s||!e)return;
  const ds=new Date(s+'T00:00:00'),de=new Date(e+'T00:00:00');
  const diff=Math.round((de-ds)/86400000)+1;
  const ce=new Date(ds);ce.setDate(ce.getDate()-1);
  const cs=new Date(ce);cs.setDate(cs.getDate()-(diff-1));
  document.getElementById('cmpS').value=cs.toISOString().slice(0,10);
  document.getElementById('cmpE').value=ce.toISOString().slice(0,10);
}
function applyDates(){
  const s=document.getElementById('dateS').value,e=document.getElementById('dateE').value;
  const on=document.getElementById('cmpOn').checked;
  const cs=on?document.getElementById('cmpS').value:null;
  const ce=on?document.getElementById('cmpE').value:null;
  if(s&&e)renderReport(s,e,cs,ce);
}

const GLOV_SYSTEM=`Jesteś asystentem analitycznym sklepu GLOV (glov.co). Rozmawiasz po polsku, po ludzku — jak kolega z firmy, nie jak raport Excel.

Zasady odpowiedzi:
- Zacznij od jednego zdania z konkretem, potem rozwiń jeśli trzeba
- Liczby podajesz tylko gdy naprawdę pomagają odpowiedzieć — nie serwujesz wszystkich cyfr z danych
- Mówisz wprost co jest dobre, a co wymaga uwagi — bez owijania w bawełnę
- Krótko. Jedno pytanie = jedna odpowiedź, nie elaborat

Dobry styl: "Paid Search konwertuje 2-3× lepiej niż Meta — warto przesunąć budżet."
Zły styl: "Sesje: 34745, transakcje: 631, CR: 1.82%, bounce: 67.3%..."

Dane: GA4 + Shopify, tylko Polska (filtr country=Poland). Masz dostęp do danych wybranego okresu.`;

async function sendChat(){
  const inp=document.getElementById('chatInput');
  const msg=inp.value.trim();if(!msg)return;
  const msgs=document.getElementById('chatMsgs');
  const sendBtn=document.getElementById('chatSend');
  msgs.innerHTML+=`<div class="msg user">${msg.replace(/</g,'&lt;')}</div>`;
  inp.value='';msgs.scrollTop=msgs.scrollHeight;
  // animacja fuzika
  sendBtn.classList.add('sending');
  setTimeout(()=>sendBtn.classList.remove('sending'),400);
  // typing indicator
  const tid='ti_'+Date.now();
  msgs.innerHTML+=`<div class="msg typing" id="${tid}"><span></span><span></span><span></span></div>`;
  msgs.scrollTop=msgs.scrollHeight;
  const ctx=window._lastData?JSON.stringify({
    kpi:window._lastData.kpi,
    top_products:(window._lastData.products||[]).slice(0,5),
    top_channels:(window._lastData.channels||[]).slice(0,5),
    funnel:window._lastData.funnel,
    top_landing:(window._lastData.landing_atc||[]).slice(0,5)
  }):'(brak danych)';
  try{
    const r=await fetch('https://glov-chat.waleqq.workers.dev',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'deepseek-chat',messages:[
        {role:'system',content:GLOV_SYSTEM},
        {role:'user',content:`Dane bieżącego zakresu:\n${ctx}\n\nPytanie: ${msg}`}
      ]})
    });
    const data=await r.json();
    const reply=data.choices?.[0]?.message?.content||'Brak odpowiedzi';
    document.getElementById(tid)?.remove();
    msgs.innerHTML+=`<div class="msg ai">${reply.replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div>`;
  }catch(err){
    document.getElementById(tid)?.remove();
    msgs.innerHTML+=`<div class="msg ai" style="color:#dc2626">Błąd: ${err.message}</div>`;
  }
  msgs.scrollTop=msgs.scrollHeight;
}
document.getElementById('chatSend').onclick=sendChat;
document.getElementById('chatInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'){e.preventDefault();sendChat();}
});

const BASE_URL='https://tomekwlqq.github.io/eel-reports/';
function loadData(showSpinner){
  if(showSpinner){
    const ov=document.getElementById('loadingOverlay');
    if(ov)ov.style.display='flex';
  }
  const t=Date.now();
  return Promise.all([
    fetch(BASE_URL+'glov_pl_daily.json?t='+t).then(r=>r.json()),
    fetch(BASE_URL+'glov_live2.json?t='+t).then(r=>r.json()).catch(()=>null)
  ]).then(([daily,live])=>{
    DAILY=daily.days||{};
    META=daily._meta||{};
    LIVE=live;
    const dk=Object.keys(DAILY).sort();
    FIRST=dk[0]||'';LAST=dk[dk.length-1]||'';
    const d30=new Date(LAST+'T00:00:00');d30.setDate(d30.getDate()-29);
    LAST30=d30.toISOString().slice(0,10);
    document.getElementById('dateS').value=LAST30;
    document.getElementById('dateE').value=LAST;
    const si=document.getElementById('srcInfo');
    if(si)si.innerHTML=`Źródło: GA4 342844459, filtr <b>country=Poland</b>. Dane: ${FIRST} → ${LAST} (${dk.length} dni). Aktualizacja: ${META.updated||'N/A'}. Boty/zagranica wykluczone. INTERNAL.`;
    preset('30d');
    initLive();
  }).catch(e=>{
    const ab=document.getElementById('alertBox');
    if(ab)ab.textContent='Błąd ładowania danych: '+e.message;
    initLive();
  }).finally(()=>{
    const ov=document.getElementById('loadingOverlay');
    if(ov)ov.style.display='none';
    const rb=document.getElementById('refreshBtn');
    if(rb){rb.disabled=false;rb.textContent='🔄 Odśwież';}
  });
}
function refreshData(){
  const rb=document.getElementById('refreshBtn');
  if(rb){rb.disabled=true;rb.textContent='⏳...';}
  // Odśwież = re-fetch glov_live2.json (świeże GA4 z ostatniego ETL)
  //         + LIVE Shopify KPI z Workera (nadpisuje zamówienia/sprzedaż na żywo)
  fetch(BASE_URL+'glov_live2.json?t='+Date.now()).then(r=>r.json()).then(live=>{LIVE=live;}).catch(()=>{})
    .then(()=>fetchLiveKPI())
    .then(()=>{
      renderLive(currentLiveTab);
      if(rb){rb.disabled=false;rb.textContent='🔄 Odśwież';}
    });
}
document.addEventListener('DOMContentLoaded',()=>loadData(true));
