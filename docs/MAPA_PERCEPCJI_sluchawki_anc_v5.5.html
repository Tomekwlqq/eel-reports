function render(){
  const container = document.getElementById('paths');
  DATA.forEach(d => {
    const badgeClass = {sytuacyjny:'syt',tozsamosciowy:'toz',ekonomiczny:'eko',impulsowy:'imp',ekologiczny:'eko'}[d.typ]||'syt';
    let html = '<div class=path>';
    html += `<h2>${d.id}. ${d.label} <span class="tag ${badgeClass}">${d.typ}</span></h2>`;
    html += `<div style="font-size:12px;color:#57606a;margin-bottom:6px">${d.states.length} etapów · Discovery 3</div>`;
    html += '<div class=states>';

    // Show states
    d.states.forEach((s,i) => {
      html += '<div class=state>';
      html += `<div class=num>${i+1}. ${s}</div>`;
      if(i === 0 && d.disc){
        d.disc.slice(0,1).forEach(q => { html += `<div class="q disc">${q}</div>`; });
      }
      if(i > 0 && d.deep && d.deep[i-1]){
        d.deep[i-1].slice(0,1).forEach(q => { html += `<div class=q>${q}</div>`; });
      }
      html += '</div>';
    });

    html += '</div></div>';
    container.innerHTML += html;
  });
}
window.onload = render;
