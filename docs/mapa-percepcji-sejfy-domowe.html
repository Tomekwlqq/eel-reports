<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Percepcji — Sejfy Domowe | SejfZone</title>
<style>
:root {
  --bg: #f6f8fa;
  --bg-sidebar: #ffffff;
  --bg-card: #ffffff;
  --bg-card-hover: #f0f3f6;
  --border: #d0d7de;
  --border-subtle: #e8ecf0;
  --text-primary: #1f2328;
  --text-secondary: #57606a;
  --text-muted: #8c959f;
  --accent: #0969da;
  --accent-hover: #0757ba;
  --success: #1a7f37;
  --warning: #9a6700;
  --danger: #cf222e;
  --sidebar-w: 280px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;display:flex;flex-direction:column}
/* TOPBAR */
.topbar{background:var(--bg-sidebar);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.topbar h1{font-size:15px;font-weight:600;color:var(--text-primary);white-space:nowrap}
.topbar h1 span{color:var(--accent)}
.search-wrap{flex:1;min-width:160px;max-width:320px;position:relative}
.search-wrap input{width:100%;padding:5px 10px 5px 30px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);outline:none}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(9,105,218,.15)}
.search-wrap::before{content:'🔍';position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:12px}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.chip{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid transparent;transition:all .15s;user-select:none;white-space:nowrap}
.chip.active{border-color:transparent}
.chip-pr{background:#fff;border-color:var(--border);color:var(--text-secondary)}
.chip-pr.active.p1{background:#cf222e;color:#fff;border-color:#cf222e}
.chip-pr.active.p2{background:#9a6700;color:#fff;border-color:#9a6700}
.chip-pr.active.p3{background:#0969da;color:#fff;border-color:#0969da}
.chip-pr.active.p4{background:#6e7781;color:#fff;border-color:#6e7781}
.chip-st{background:#fff;border-color:var(--border);color:var(--text-secondary)}
.chip-st.active.nowy{background:#1a7f37;color:#fff;border-color:#1a7f37}
.chip-st.active.istnieje{background:#0969da;color:#fff;border-color:#0969da}
.chip-st.active.rozbudowac{background:#9a6700;color:#fff;border-color:#9a6700}
.statsbar{font-size:12px;color:var(--text-muted);white-space:nowrap;padding:0 20px;background:var(--bg);border-bottom:1px solid var(--border-subtle)}
/* LAYOUT */
.layout{display:flex;flex:1;min-height:0}
/* SIDEBAR */
.sidebar{width:var(--sidebar-w);background:var(--bg-sidebar);border-right:1px solid var(--border);padding:0;flex-shrink:0;display:flex;flex-direction:column;overflow-y:auto;position:sticky;top:56px;max-height:calc(100vh - 56px)}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg-sidebar);flex-shrink:0}
.stab{flex:1;padding:10px 4px;border:none;background:none;cursor:pointer;font-size:11px;font-weight:600;color:var(--text-muted);text-align:center;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:2px;border-bottom:2px solid transparent}
.stab:hover{color:var(--text-primary);background:var(--bg)}
.stab.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--bg-card)}
.stab-icon{font-size:16px}
.sidebar-content{padding:14px 12px;flex:1;overflow-y:auto}
.filter-section{margin-bottom:16px}
.filter-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.path-btns{display:flex;flex-wrap:wrap;gap:5px}
.path-btn{padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .15s;color:#fff;opacity:.55}
.path-btn.active{opacity:1;transform:scale(1.05)}
.path-btn.all{background:var(--text-secondary)!important}
.state-chips{display:flex;flex-wrap:wrap;gap:4px}
.sch{padding:3px 8px;border-radius:12px;font-size:11px;font-weight:500;cursor:pointer;background:var(--bg);border:1.5px solid var(--border);color:var(--text-secondary);transition:all .15s}
.sch.active{background:var(--accent);color:#fff;border-color:var(--accent)}
/* CARDS */
.main{flex:1;padding:16px;overflow-y:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:14px;cursor:default;transition:all .15s;border-left:4px solid #ccc}
.card:hover{background:var(--bg-card-hover);box-shadow:0 2px 8px rgba(0,0,0,.08);transform:translateY(-1px)}
.card-meta{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.card-nr{font-size:11px;color:var(--text-muted);font-weight:500;min-width:24px}
.badge{padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;color:#fff}
.badge-state{padding:2px 6px;border-radius:10px;font-size:10px;font-weight:500;background:var(--bg);border:1px solid var(--border);color:var(--text-secondary)}
.pr-chip{padding:1px 6px;border-radius:8px;font-size:10px;font-weight:700}
.pr-P1{background:#ffeef0;color:#cf222e;border:1px solid #ffb8c2}
.pr-P2{background:#fff8e1;color:#9a6700;border:1px solid #ffd56b}
.pr-P3{background:#ddf4ff;color:#0969da;border:1px solid #a5d6fb}
.pr-P4{background:#f6f8fa;color:#6e7781;border:1px solid #d0d7de}
.st-ISTNIEJE{background:#dafbe1;color:#1a7f37;border:1px solid #80d4a0}
.st-ROZBUDOWAĆ{background:#fff8c5;color:#9a6700;border:1px solid #f7c948}
.st-BRAK{background:#f6f8fa;color:#57606a;border:1px solid #d0d7de}
.card-title{font-size:13px;font-weight:600;color:var(--text-primary);line-height:1.4;margin-bottom:6px}
.card-kw{font-size:11px;color:var(--text-muted);font-style:italic;margin-top:4px}
.type-tag{padding:1px 6px;border-radius:4px;font-size:10px;font-weight:500;background:var(--bg);border:1px solid var(--border);color:var(--text-muted)}
/* LISTA TAB */
.lista-wrap{display:flex;flex-direction:column;height:100%}
.lista-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border-subtle)}
.lista-controls button{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--bg-card);color:var(--text-secondary);transition:all .15s}
.lista-controls button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.copy-btn{background:var(--bg-card);border:1.5px solid var(--border);color:var(--text-secondary);padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;margin-left:auto;transition:all .15s}
.copy-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.progress-bar-wrap{margin-bottom:12px}
.progress-bar-track{height:6px;background:var(--border-subtle);border-radius:3px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--success);border-radius:3px;transition:width .3s}
.progress-label{font-size:11px;color:var(--text-muted);margin-top:4px;text-align:right}
.lista-list{flex:1;overflow-y:auto;list-style:none}
.lista-item{display:flex;align-items:flex-start;gap:8px;padding:7px 4px;border-bottom:1px solid var(--border-subtle);cursor:pointer;transition:background .1s;border-radius:4px}
.lista-item:hover{background:var(--bg-card-hover)}
.lista-item input[type=checkbox]{margin-top:2px;flex-shrink:0;cursor:pointer;accent-color:var(--success);width:14px;height:14px}
.lista-item.checked .lista-item-text{text-decoration:line-through;color:var(--text-muted)}
.lista-item-text{font-size:12px;line-height:1.45}
.lista-item-meta{font-size:10px;color:var(--text-muted);margin-top:2px}
/* INFO TAB */
.info-wrap{font-size:13px;line-height:1.6;color:var(--text-primary)}
.info-section{margin-bottom:20px}
.info-section h3{font-size:13px;font-weight:700;color:var(--text-primary);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border-subtle)}
.info-section p{font-size:12px;color:var(--text-secondary);margin-bottom:6px}
.cep-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}
.cep-card{padding:8px 10px;border-radius:6px;font-size:11px;color:#fff;font-weight:600;line-height:1.4}
.cep-card span{display:block;font-size:10px;font-weight:400;opacity:.9;margin-top:2px}
.type-legend{display:flex;flex-direction:column;gap:5px}
.type-row{display:flex;gap:8px;align-items:flex-start}
.type-row .badge{flex-shrink:0;background:var(--bg);color:var(--text-secondary);border:1px solid var(--border);font-size:10px;padding:1px 6px}
.type-row p{font-size:11px;color:var(--text-secondary)}
/* EMPTY STATE */
.empty{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty svg{width:48px;height:48px;margin-bottom:12px;opacity:.4}
</style>
</head>
<body>

<div class="topbar" id="topbar">
  <h1>🔒 Mapa Percepcji — <span>Sejfy Domowe</span></h1>

</div>

      if(!selSt.includes(norm))return false;
    }
    if(q&&!a.t.toLowerCase().includes(q)&&!a.k.toLowerCase().includes(q))return false;
    return true;
  });
}

function sortedArticles(arr){
  const order={P1:1,P2:2,P3:3,P4:4};
  const sc={BRAK:1,'ROZBUDOWAĆ':2,ISTNIEJE:3};
  if(sortKey==='pr')return [...arr].sort((a,b)=>(order[a.pr]-order[b.pr])||a.nr-b.nr);
  if(sortKey==='sciezka')return [...arr].sort((a,b)=>a.p.localeCompare(b.p)||a.nr-b.nr);
  return [...arr].sort((a,b)=>a.nr-b.nr);
}

// ── TABS ──────────────────────────────────────────────────────────────────────
let activeTab='mapa';
function switchTab(tab){
  activeTab=tab;
  ['mapa','lista','info'].forEach(t=>{
    document.getElementById('stab-'+t).classList.toggle('active',t===tab);
  });
  const tb=document.getElementById('topbar');
  const sb=document.getElementById('statsbar');
  if(tab==='info'){tb.style.display='flex';sb.style.display='none';}
  else{tb.style.display='flex';sb.style.display='block';}
  renderSidebar();
  if(tab==='mapa')render();
  else if(tab==='lista')renderList();
  else renderInfo();
}

// ── RENDER MAPA ───────────────────────────────────────────────────────────────
function render(){
  if(activeTab!=='mapa')return;
  const arr=filtered();
  const main=document.getElementById('main');
  const sb=document.getElementById('statsbar');
  sb.textContent=`Wyświetlam ${arr.length} z ${A.length} artykułów`;
  if(!arr.length){main.innerHTML='<div class="empty"><div style="font-size:48px">🔍</div><p>Brak wyników dla wybranych filtrów</p></div>';return;}
  main.innerHTML='<div class="grid">'+arr.map(a=>{
    const pc=PC[a.p]||'#6b7280';
    const norm=a.st==='ROZBUDOWAĆ'||a.y==='ROZBUDUJ'?'ROZBUDOWAĆ':a.st;
    const yc=TC[a.y]||'#6b7280';
    const states=a.s.join(', ');
    return `<div class="card" style="border-left-color:${pc}">
      <div class="card-meta">
        <span class="card-nr">#${a.nr}</span>
        <span class="badge" style="background:${pc}">${a.p}</span>
        <span class="badge-state">${states}</span>
        <span class="pr-chip ${PRC[a.pr]}">${a.pr}</span>
        <span class="badge-state ${SC[norm]||'st-BRAK'}">${norm}</span>
      </div>
      <div class="card-title">${a.t}</div>
      <div style="display:flex;gap:5px;align-items:center;margin-top:4px">
        <span class="type-tag" style="border-color:${yc};color:${yc}">${a.y}</span>
      </div>
      ${a.k&&a.k!=='—'?`<div class="card-kw">🔑 ${a.k}</div>`:''}
    </div>`;
  }).join('')+'</div>';
}

// ── RENDER LISTA ──────────────────────────────────────────────────────────────
function toggleCheck(nr){
  checked[nr]=!checked[nr];
  renderList();
}
function setSort(s){sortKey=s;document.querySelectorAll('.sort-btn').forEach(b=>b.classList.toggle('active',b.dataset.s===s));renderList();}
function copyList(){
  const arr=sortedArticles(A);
  const txt=arr.map(a=>`[${checked[a.nr]?'x':' '}] ${a.nr}. ${a.t} (${a.p} | ${a.s.join('+')} | ${a.y} | ${a.st==='ROZBUDOWAĆ'||a.y==='ROZBUDUJ'?'ROZBUDOWAĆ':a.st} | ${a.pr})`).join('\n');
  navigator.clipboard.writeText(txt).then(()=>{const b=document.getElementById('copy-btn');b.textContent='✅ Skopiowano!';setTimeout(()=>b.textContent='📋 Kopiuj listę',2000);});
}
function renderList(){
  if(activeTab!=='lista')return;
  const total=A.length;
  const done=Object.values(checked).filter(Boolean).length;
  const pct=Math.round(done/total*100);
  document.getElementById('main').innerHTML=`
    <div class="lista-wrap" style="max-width:860px;margin:0 auto">
      <div class="lista-controls">
        <span style="font-size:12px;color:var(--text-muted);font-weight:600">SORTUJ:</span>
        <button class="sort-btn ${sortKey==='pr'?'active':''}" data-s="pr" onclick="setSort('pr')">Priorytet</button>
        <button class="sort-btn ${sortKey==='nr'?'active':''}" data-s="nr" onclick="setSort('nr')">Numer</button>
        <button class="sort-btn ${sortKey==='sciezka'?'active':''}" data-s="sciezka" onclick="setSort('sciezka')">Ścieżka</button>
        <button class="copy-btn" id="copy-btn" onclick="copyList()">📋 Kopiuj listę</button>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        <div class="progress-label">${done} / ${total} gotowych (${pct}%)</div>
      </div>
      <ul class="lista-list">
        ${sortedArticles(A).map(a=>`
        <li class="lista-item ${checked[a.nr]?'checked':''}" onclick="toggleCheck(${a.nr})">
          <input type="checkbox" ${checked[a.nr]?'checked':''} onclick="event.stopPropagation();toggleCheck(${a.nr})">
          <div>
            <div class="lista-item-text">${a.nr}. ${a.t}</div>
            <div class="lista-item-meta" style="color:${PC[a.p]||'#6b7280'}">
              ${a.p} | ${a.s.join('+')} | ${a.y} | ${a.st==='ROZBUDOWAĆ'||a.y==='ROZBUDUJ'?'ROZBUDOWAĆ':a.st} | <b>${a.pr}</b>
            </div>
          </div>
        </li>`).join('')}
      </ul>
    </div>`;
}

// ── RENDER INFO ───────────────────────────────────────────────────────────────

// ── RENDER SIDEBAR ─────────────────────────────────────────────────────────────
function renderSidebar(){
  const sc=document.getElementById('sidebar-content');
  if(activeTab==='lista'){
    sc.innerHTML='<p style="font-size:12px;color:var(--text-muted);padding:8px 0">Interaktywna lista wszystkich 230 artykułów z checkboxami i eksportem.</p>';
    renderList();return;
  }
  if(activeTab==='info'){
    sc.innerHTML='<p style="font-size:12px;color:var(--text-muted);padding:8px 0">Metodologia, źródła CEP i przewodnik po typach treści.</p>';
    renderInfo();return;
  }
  // MAPA sidebar
  const allPaths=['All','A','B','C','D','E','F','G','Cross'];
  const stateOptions=selPath!=='All'?(PS[selPath]||[]):[];

  sc.innerHTML=`
    <div class="filter-section">
      <div class="filter-label">Ścieżka</div>
      <div class="path-btns">
        ${allPaths.map(p=>{
          const col=p==='All'?'#57606a':(PC[p]||'#6b7280');
          const label=p==='All'?'Wszystkie':p;
          return `<button class="path-btn ${p==='All'?'all':''} ${selPath===p?'active':''}"
            style="background:${col}" onclick="setPath('${p}')">${label}</button>`;
        }).join('')}
      </div>
    </div>
    ${stateOptions.length?`
    <div class="filter-section">
      <div class="filter-label">Stan percepcji</div>
      <div class="state-chips">
        ${stateOptions.map(s=>`<span class="sch ${selStates.includes(s)?'active':''}" onclick="toggleState('${s}')">${s}</span>`).join('')}
      </div>
    </div>`:''}
    <div class="filter-section">
      <div class="filter-label">Typ treści</div>
      <div class="state-chips">
        ${['NOWY','ROZBUDOWAĆ','ISTNIEJE','FAQ-PDP','TEKST-SEO','ELEMENT-PDP','EMAIL','STRONA'].map(t=>{
          const active=selSt.includes(t);
          return `<span class="sch ${active?'active':''}" style="${active?`background:${TC[t]||'var(--accent)'};border-color:${TC[t]||'var(--accent)'}`:''}" onclick="toggleStFilter('${t}')">${t}</span>`;
        }).join('')}
      </div>
    </div>
    <div class="filter-section" style="border-top:1px solid var(--border-subtle);padding-top:12px">
      <div class="filter-label">Legenda</div>
      ${Object.entries(PC).filter(([p])=>p!=='Cross').map(([p,c])=>`
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
          <span style="width:10px;height:10px;border-radius:50%;background:${c};flex-shrink:0"></span>
          <span style="font-size:11px;color:var(--text-secondary)">${PN[p]}</span>
        </div>`).join('')}
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
          <span style="width:10px;height:10px;border-radius:50%;background:${PC.Cross};flex-shrink:0"></span>
          <span style="font-size:11px;color:var(--text-secondary)">${PN.Cross}</span>
        </div>
    </div>`;
}

function setPath(p){selPath=p;selStates=[];renderSidebar();render();}
function toggleState(s){selStates=selStates.includes(s)?selStates.filter(x=>x!==s):[...selStates,s];renderSidebar();render();}
function togglePr(p){
  selPr=selPr.includes(p)?selPr.filter(x=>x!==p):[...selPr,p];
  document.querySelectorAll('.chip-pr').forEach(c=>{
    const cp=c.dataset.pr;
    c.classList.toggle('active',selPr.includes(cp));
    if(selPr.includes(cp))c.classList.add(cp.toLowerCase());else c.classList.remove(cp.toLowerCase());
  });
  render();
}
function toggleSt(s){
  selSt=selSt.includes(s)?selSt.filter(x=>x!==s):[...selSt,s];
  document.querySelectorAll('.chip-st').forEach(c=>{
    const cs=c.dataset.st;
    c.classList.toggle('active',selSt.includes(cs));
    if(selSt.includes(cs)){const k=cs.toLowerCase().replace('ować','owac');c.classList.add(k);}
    else{c.classList.remove(cs.toLowerCase().replace('ować','owac'));}
  });
  render();
}
function toggleStFilter(t){
  selSt=selSt.includes(t)?selSt.filter(x=>x!==t):[...selSt,t];
  renderSidebar();render();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderSidebar();
render();
</script>

</html>
