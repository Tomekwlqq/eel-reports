<!DOCTYPE html><html lang=pl><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Słuchawki z ANC — CS + Mapa</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,Segoe UI,sans-serif;background:#f6f8fa;color:#1f2328}
.tabs{display:flex;background:#fff;border-bottom:2px solid #d0d7de;position:sticky;top:0;z-index:100}
.tab{padding:12px 28px;cursor:pointer;font-size:14px;font-weight:600;color:#57606a;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab:hover{color:#0969da}.tab.active{color:#0969da;border-bottom-color:#0969da}
.panel{display:none;padding:0}.panel.active{display:block}
iframe{width:100%;border:none;height:calc(100vh - 48px)}
</style></head><body>
<div class=tabs>
<button class="tab active" onclick="switchT(this,'m')">🗺️ Mapa</button>
<button class=tab onclick="switchT(this,'c')">📄 CS</button>
<button class=tab onclick="switchT(this,'x')">🔗 Łączny</button>
</div>
<div id=tm class="panel active"><iframe src=MAPA_PERCEPCJI_sluchawki_anc_v5.5.html></iframe></div>
<div id=tc class=panel><iframe src=cs_sluchawki_anc_v5.7.html></iframe></div>
<div id=tx class=panel style=display:flex;height:calc(100vh-48px)>
<iframe src=MAPA_PERCEPCJI_sluchawki_anc_v5.5.html style=width:50%;height:100%;border-right:1px solid #d0d7de></iframe>
<iframe src=cs_sluchawki_anc_v5.7.html style=width:50%;height:100%></iframe>
</div>
<script>
function switchT(b,i){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));b.classList.add('active');document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.getElementById('t'+i).classList.add('active')}
</script>
</body></html>
